<style>
:root{--bg:#f7f8fb;--card:#fff;--ink:#111827;--muted:#667085;--line:#e5e7eb;--accent:#111827;--good:#16a34a;--goodbg:#ecfdf3;--goodline:#abefc6;--bad:#dc2626;--gray:#f2f4f7}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(180deg,#f8fafc,#fff);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Segoe UI,sans-serif}
.app{max-width:980px;margin:0 auto;padding:18px 12px 90px}.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-bottom:1px solid #bfdbfe;padding:calc(18px + env(safe-area-inset-top)) 16px 14px}.top-inner{max-width:980px;margin:0 auto}
h1{font-size:20px;margin:0 0 14px;letter-spacing:-.03em;line-height:1.2;text-align:center}.small{font-size:12px;color:var(--muted);line-height:1.45}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
select,button,input,textarea{font:inherit}select{flex:1;min-width:180px;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}
button{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 12px;font-weight:700;color:var(--ink);touch-action:manipulation;cursor:pointer}button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button.complete.active{background:var(--goodbg);color:#067647;border-color:var(--goodline)}button.toggle.off{background:#fff;color:var(--ink)}button.toggle.on{background:var(--gray);color:#475467}
button.bookmark{padding:7px 9px;border-radius:999px;background:#fff;color:#98a2b3}button.bookmark.active{background:#fffbeb;border-color:#fedf89;color:#b54708}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 24px rgba(16,24,40,.05);padding:16px;margin:12px 0}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.section-title h2{font-size:18px;margin:0}.badge{display:inline-flex;border-radius:999px;background:#f2f4f7;color:#344054;padding:4px 8px;font-size:12px;font-weight:700}
.vocab{display:grid;gap:10px}.vitem{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.zh{font-size:20px;font-weight:800}.pinyin{color:#475467;margin-top:2px}.ja{color:#344054;margin-top:4px}.ex{margin-top:10px;line-height:1.55}
.gitem{border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0;background:#fff}.gitem h3{margin:0 0 6px;font-size:17px}.label{font-weight:800;color:#344054}.note{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:14px;padding:10px;margin-top:8px;line-height:1.55}
.testq{border-top:1px solid var(--line);padding:14px 0}.testq:first-child{border-top:0}.opts{display:grid;gap:8px;margin-top:8px}.opt{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}
textarea,input[type=text]{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:8px;background:#fff;min-height:44px}textarea{min-height:88px;resize:vertical}
.answer{display:none;margin-top:8px;border-radius:14px;background:#f8fafc;border:1px dashed #cbd5e1;padding:10px}.show-answers .answer{display:block}
.hidden-ja .ja,.hidden-ja .exja{display:none}.hidden-pinyin .pinyin,.hidden-pinyin .expinyin{display:none}.scorebox{background:#fffbeb;border:1px solid #fedf89;border-radius:16px;padding:12px;margin-top:12px}.good{color:var(--good);font-weight:800}.bad{color:var(--bad);font-weight:800}.muted{color:var(--muted)}
.drag-area{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding:10px;border:1px dashed #cbd5e1;border-radius:16px;background:#f8fafc;min-height:58px}
.answer-area{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding:10px;border:1px solid #d0d5dd;border-radius:16px;background:#fff;min-height:58px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:9px 12px;border-radius:14px;background:white;border:1px solid var(--line);font-weight:800;box-shadow:0 2px 6px rgba(16,24,40,.05);touch-action:manipulation}
.chip.used{background:#eef2f6;color:#98a2b3;text-decoration:line-through}
.chip.answer-chip{background:#111827;color:white;border-color:#111827}
.chip.dragging{opacity:.45}.chip.selected{outline:3px solid #c7d2fe}
.bookmark-panel{display:none}.bookmark-panel.active{display:block}.empty{padding:14px;border:1px dashed #cbd5e1;border-radius:16px;background:#f8fafc;color:var(--muted)}
.home-grid{display:grid;gap:12px}.home-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;box-shadow:0 4px 14px rgba(16,24,40,.04)}
.home-card h3{margin:0 0 6px;font-size:17px}.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}.daybtn{padding:10px 0;border-radius:12px;background:#fff}.daybtn.done{background:var(--goodbg);border-color:var(--goodline);color:#067647}
.progressline{height:10px;border-radius:999px;background:#eef2f6;overflow:hidden;margin-top:8px}.progressline span{display:block;height:100%;background:#111827;width:0%}
@media(min-width:700px){.home-grid{grid-template-columns:1fr 1fr}.day-grid{grid-template-columns:repeat(10,1fr)}}
.bottomnav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 12px;display:flex;gap:8px;z-index:20}.bottomnav button{flex:1}
@media(max-width:430px){.top{padding:calc(20px + env(safe-area-inset-top)) 14px 14px}h1{font-size:21px;margin-bottom:16px;text-align:center}button{padding:10px 11px}.app{padding-top:20px}}@media(min-width:800px){.vocab{grid-template-columns:1fr 1fr}.top h1{font-size:28px}.app{padding-bottom:40px}.bottomnav{display:none}}

.syncbar{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:10px;padding:9px;border:1px solid #dbeafe;background:#eff6ff;border-radius:16px}
.syncbar .sync-status{font-size:12px;color:#344054;font-weight:700}
.syncbar .sync-user{font-size:12px;color:#475467;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.syncbar button{padding:8px 10px;font-size:12px}
.syncbar .login{background:#111827;color:white;border-color:#111827}
.syncbar .logout{background:white;color:#344054}
.syncbar .force-upload{background:#fffbeb;color:#b45309;border-color:#fde68a;font-size:12px;padding:8px 10px}
.syncdot{width:8px;height:8px;border-radius:999px;background:#98a2b3;display:inline-block}
.syncdot.on{background:#12b76a}.syncdot.warn{background:#f79009}.syncdot.err{background:#f04438}
.cloud-note{font-size:11px;color:#667085;text-align:center;margin-top:4px}

</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXGj_exdeYVpfxePgo6HHShSQ-ArM4uDQ",
  authDomain: "hsk4-ee5c2.firebaseapp.com",
  projectId: "hsk4-ee5c2",
  storageBucket: "hsk4-ee5c2.firebasestorage.app",
  messagingSenderId: "1088820844889",
  appId: "1:1088820844889:web:2aebed464271c02f359448"
};
const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);
const provider = new GoogleAuthProvider();
let cloudUser = null;
let cloudReady = false;
let cloudLoading = false;
let cloudSaveTimer = null;
let suppressCloudSave = false;
function nowMs(){ return Date.now(); }
function setSyncStatus(kind, text, userText=''){
  const dot=document.getElementById('syncDot'), status=document.getElementById('syncStatus'), user=document.getElementById('syncUser'), login=document.getElementById('loginBtn'), logout=document.getElementById('logoutBtn');
  if(dot) dot.className='syncdot '+(kind==='on'?'on':kind==='err'?'err':'warn');
  if(status) status.textContent=text;
  if(user) user.textContent=userText||'';
  if(login) login.style.display=cloudUser?'none':'';
  if(logout) logout.style.display=cloudUser?'':'none';
  const forceBtn=document.getElementById('forceUploadBtn');
  if(forceBtn) forceBtn.style.display=cloudUser?'':'none';
}
function cloudDocRef(){ return cloudUser ? doc(db,'users',cloudUser.uid,'hsk4','state') : null; }
function localUpdatedAt(){ const n=Number(localStorage.getItem(storageKey+'-updatedAtMs')||0); return Number.isFinite(n)?n:0; }
function markLocalUpdated(){ localStorage.setItem(storageKey+'-updatedAtMs', String(nowMs())); }
function normalizeStateForCloud(s){ return {completed:s.completed||{}, answers:s.answers||{}, scores:s.scores||{}, bookmarks:s.bookmarks||{}, dragOrders:s.dragOrders||{}, currentDay:current||1, updatedAtMs:nowMs(), appVersion:'firebase-sync-v1', storageKey:storageKey}; }
async function saveCloudState(force=false){
  if(!cloudUser || ((!cloudReady)&&!force) || cloudLoading) return;
  try{ const payload=normalizeStateForCloud(state); payload.updatedAt=serverTimestamp(); await setDoc(cloudDocRef(), payload, {merge:true}); setSyncStatus('on','クラウド同期済み',cloudUser.email||''); }
  catch(e){ console.error(e); setSyncStatus('err','クラウド保存エラー：Rulesを確認',cloudUser?.email||''); }
}
function scheduleCloudSave(){ if(!cloudUser || suppressCloudSave) return; setSyncStatus('warn','クラウドへ保存中...',cloudUser.email||''); clearTimeout(cloudSaveTimer); cloudSaveTimer=setTimeout(()=>saveCloudState(false),700); }
async function loadCloudState(){
  if(!cloudUser) return; cloudLoading=true; setSyncStatus('warn','クラウド同期を確認中...',cloudUser.email||'');
  try{
    const snap=await getDoc(cloudDocRef()); const localTs=localUpdatedAt();
    if(snap.exists()){ const cloud=snap.data()||{}; const cloudTs=Number(cloud.updatedAtMs||0);
      // データの有無で判断（タイムスタンプだけに頼らない）
      const localIsEmpty=!Object.keys(state.completed||{}).length&&!Object.keys(state.bookmarks||{}).length&&!Object.keys(state.answers||{}).length;
      const cloudIsEmpty=!Object.keys(cloud.completed||{}).length&&!Object.keys(cloud.bookmarks||{}).length&&!Object.keys(cloud.answers||{}).length;
      // クラウドが新しい かつ クラウドにデータあり → クラウドから読む
      // ローカルが空 → クラウドから読む
      // クラウドが空 かつ ローカルにデータあり → ローカルをアップロード（復旧）
      if((cloudTs>localTs&&!cloudIsEmpty)||localIsEmpty){ suppressCloudSave=true; state.completed=cloud.completed||{}; state.answers=cloud.answers||{}; state.scores=cloud.scores||{}; state.bookmarks=cloud.bookmarks||{}; state.dragOrders=cloud.dragOrders||{}; if(cloud.currentDay) current=Number(cloud.currentDay)||current; localStorage.setItem(storageKey,JSON.stringify(state)); localStorage.setItem(storageKey+'-updatedAtMs',String(cloudTs)); localStorage.setItem('hsk4-current-day',String(current)); suppressCloudSave=false; setSyncStatus('on','クラウドから同期済み',cloudUser.email||''); if(typeof render==='function') render(); }
      else { cloudReady=true; await saveCloudState(true); setSyncStatus('on','この端末のデータをクラウドへ同期済み',cloudUser.email||''); }
    } else { cloudReady=true; await saveCloudState(true); setSyncStatus('on','初回同期完了',cloudUser.email||''); }
    cloudReady=true;
  } catch(e){ console.error(e); setSyncStatus('err','同期エラー：Firebase設定/Rulesを確認',cloudUser?.email||''); } finally { cloudLoading=false; }
}
window.hsk4GoogleLogin=async function(){ try{ setSyncStatus('warn','Googleログイン中...'); try{ await signInWithPopup(auth,provider); } catch(e){ console.warn('popup failed; redirect',e); await signInWithRedirect(auth,provider); } } catch(e){ console.error(e); setSyncStatus('err','ログインできませんでした'); } };
window.hsk4ForceUpload=async function(){
  if(!cloudUser){ alert('先にログインしてください'); return; }
  if(!confirm('ローカルのデータをクラウドへ強制アップロードします。クラウドのデータは上書きされます。よろしいですか？')) return;
  setSyncStatus('warn','強制アップロード中...',cloudUser.email||'');
  cloudReady=true;
  markLocalUpdated();
  await saveCloudState(true);
  setSyncStatus('on','強制アップロード完了',cloudUser.email||'');
};
window.hsk4Logout=async function(){ await saveCloudState(true); await signOut(auth); };
getRedirectResult(auth).catch(e=>console.warn('Redirect result error',e));
onAuthStateChanged(auth, async (user)=>{ cloudUser=user; cloudReady=false; if(user){ setSyncStatus('warn','ログイン済み：同期準備中...',user.email||''); await loadCloudState(); } else { setSyncStatus('warn','未ログイン：この端末内に保存中'); } });
document.addEventListener('click', (e)=>{
  if(e.target&&e.target.id==='loginBtn') window.hsk4GoogleLogin();
  if(e.target&&e.target.id==='logoutBtn') window.hsk4Logout();
  if(e.target&&e.target.id==='forceUploadBtn') window.hsk4ForceUpload();

swer": "手续"}, {"type": "mc", "q": "文法「方向補語：进来进去」の説明として正しいものは？", "options": ["入ってくる/入っていく", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "入ってくる/入っていく"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["开着", "门"], "answer": "门开着。"}, {"type": "writing", "q": "ゴミを外に出してください。", "answer": "请把垃圾拿出去。"}]}, {"day": 6, "title": "Day 6｜HSK4 基礎強化", "vocab": [{"id": "d6-v0", "zh": "顺利", "pinyin": "shùnlì", "ja": "順調だ", "example": "今天的会议进行得很顺利。", "exPinyin": "Jīntiān de huìyì jìnxíng de hěn shùnlì.", "exJa": "今日の会議はとても順調に進みました。"}, {"id": "d6-v1", "zh": "安全", "pinyin": "ānquán", "ja": "安全だ", "example": "晚上回家要注意安全。", "exPinyin": "Wǎnshang huí jiā yào zhùyì ānquán.", "exJa": "夜帰る時は安全に気をつけてください。"}, {"id": "d6-v2", "zh": "准时", "pinyin": "zhǔnshí", "ja": "時間通り", "example": "请大家明天准时到会议室。", "exPinyin": "Qǐng dàjiā míngtiān zhǔnshí dào huìyìshì.", "exJa": "明日は時間通りに会議室に来てください。"}, {"id": "d6-v3", "zh": "负责", "pinyin": "fùzé", "ja": "担当する", "example": "这个项目由我负责。", "exPinyin": "Zhège xiàngmù yóu wǒ fùzé.", "exJa": "このプロジェクトは私が担当します。"}, {"id": "d6-v4", "zh": "同意", "pinyin": "tóngyì", "ja": "同意する", "example": "我同意你的看法。", "exPinyin": "Wǒ tóngyì nǐ de kànfǎ.", "exJa": "あなたの考えに賛成です。"}], "grammar": [{"id": "d6-g0", "name": "可能補語：看得懂", "pinyin": "de/bu", "meaning": "〜して理解できる/できない", "explain": "動詞＋得/不＋結果補語で可能・不可能を表します。", "contrast": "看懂 は理解する、看得懂 は読んで理解できる、看不懂 は読んでも分からない。", "mistake": "会と混同しないこと。", "example": "这篇文章我看得懂。", "exPinyin": "Zhè piān wénzhāng wǒ kàn de dǒng.", "exJa": "この文章は読んで理解できます。", "test": "この説明は聞いて分かりません。", "answer": "这个说明我听不懂。"}, {"id": "d6-g1", "name": "可能補語：买得到", "pinyin": "de dào", "meaning": "手に入れられる", "explain": "動詞＋得到/不到で、目的を達成できるかを表します。", "contrast": "买得到 は買える、买不到 は買えない。", "mistake": "可能性というより結果達成の可否です。", "example": "这个票今天买得到吗？", "exPinyin": "Zhège piào jīntiān mǎi de dào ma?", "exJa": "このチケットは今日買えますか。", "test": "この店は予約できますか。", "answer": "这家店订得到吗？"}, {"id": "d6-g2", "name": "比構文", "pinyin": "bǐ", "meaning": "AはBより〜", "explain": "A比B＋形容詞で比較を表します。", "contrast": "上海 g1", "name": "越来越", "pinyin": "yuèláiyuè", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。", "contrast": "越来越自然 はだんだん自然になる。越A越BはAすればするほどBです。", "mistake": "more and moreを直訳せず、越来越＋形容詞で覚えます。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。"}, {"id": "d7-g2", "name": "越A越B", "pinyin": "yuè…yuè…", "meaning": "〜すればするほど〜", "explain": "越A越Bで、Aの程度が上がるほどBも変化することを表します。", "contrast": "越学越有意思 は学べば学ぶほど面白い。", "mistake": "前後の関係をはっきりさせます。", "example": "中文越学越有意思。", "exPinyin": "Zhōngwén yuè xué yuè yǒu yìsi.", "exJa": "中国語は学べば学ぶほど面白いです。", "test": "話せば話すほど自然になります。", "answer": "越说越自然。"}], "test": [{"type": "mc", "q": "「拒绝」の意味は？", "options": ["処理する、対応する", "解決する", "断る", "起こる、発生する"], "answer": "断る"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n你能再____一下吗？", "options": ["解释", "改变", "推迟", "提前"], "answer": "解释"}, {"type": "mc", "q": "文法「没有那么」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["我想象的", "简单", "那么", "没有", "这个问题"], "answer": "这个问题没有我想象的那么简单。"}, {"type": "writing", "q": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。"}]}, {"day": 8, "title": "Day 8｜HSK4 基礎強化", "vocab": [{"id": "d8-v0", "zh": "检查", "pinyin": "jiǎnchá", "ja": "チェックする", "example": "发邮件之前，请检查一下内容。", "exPinyin": "Fā yóujiàn zhīqián, qǐng jiǎnchá yíxià nèiróng.", "exJa": "メールを送る前に内容を確認してください。"}, {"id": "d8-v1", "zh": "整理", "pinyin": "zhěnglǐ", "ja": "整理する", "example": "我把今天的会议内容整理好了。", "exPinyin": "Wǒ bǎ jīntiān de huìyì nèiróng zhěnglǐ hǎo le.", "exJa": "今日の会議内容を整理しました。"}, {"id": "d8-v2", "zh": "准备", "pinyin": "zhǔnbèi", "ja": "準備する", "example": "我已经准备好明天的资料了。", "exPinyin": "Wǒ yǐjīng zhǔnbèi hǎo míngtiān de zīliào le.", "exJa": "明日の資料はもう準備できました。"}, {"id": "d8-v3", "zh": "计划", "pinyin": "jìhuà", "ja": "計画する", "example": "周末你有什么计划？", "exPinyin": "Zhōumò nǐ yǒu shénme jìhuà?", "exJa": "週末は何か予定がありますか。"}, : "中国語の表現力を高めたいです。"}, {"id": "d13-v2", "zh": "速度", "pinyin": "sùdù", "ja": "速度", "example": "他说话的速度太快了。", "exPinyin": "Tā shuōhuà de sùdù tài kuài le.", "exJa": "彼の話すスピードは速すぎます。"}, {"id": "d13-v3", "zh": "质量", "pinyin": "zhìliàng", "ja": "質", "example": "这份报告的质量不错。", "exPinyin": "Zhè fèn bàogào de zhìliàng búcuò.", "exJa": "このレポートの質は悪くありません。"}, {"id": "d13-v4", "zh": "态度", "pinyin": "tàidu", "ja": "態度", "example": "他的工作态度很认真。", "exPinyin": "Tā de gōngzuò tàidu hěn rènzhēn.", "exJa": "彼の仕事の態度はとても真面目です。"}], "grammar": [{"id": "d13-g0", "name": "再", "pinyin": "zài", "meaning": "もう一度、またこれから", "explain": "未来やこれからの繰り返し・追加を表します。", "contrast": "请再说一遍。", "mistake": "すでに起きたことには又が自然です。", "example": "请再说一遍。", "exPinyin": "Qǐng zài shuō yí biàn.", "exJa": "もう一度言ってください。", "test": "もう一度説明してください。", "answer": "请再解释一下。"}, {"id": "d13-g1", "name": "还是或者", "pinyin": "háishi/huòzhě", "meaning": "選択疑問/平叙文の選択", "explain": "疑問文で選択を聞く時は还是、普通の文でまたはは或者です。", "contrast": "你喝茶还是咖啡？", "mistake": "疑問文で或者を使うと不自然なことがあります。", "example": "你坐地铁还是打车？", "exPinyin": "Nǐ zuò dìtiě háishi dǎchē?", "exJa": "地下鉄ですか、タクシーですか。", "test": "コーヒーかお茶を飲みたいです。", "answer": "我想喝咖啡或者茶。"}, {"id": "d13-g2", "name": "才", "pinyin": "cái", "meaning": "やっと、〜しか", "explain": "才は思ったより遅い・少ない感覚を表します。", "contrast": "八点才到 は8時になってやっと着いた。", "mistake": "就と感覚が逆です。", "example": "他十点才到公司。", "exPinyin": "Tā shí diǎn cái dào gōngsī.", "exJa": "彼は10時になってやっと会社に着きました。", "test": "私は今やっと分かりました。", "answer": "我现在才明白。"}], "test": [{"type": "mc", "q": "「方法」の意味は？", "options": ["担当する", "方法", "安全だ", "時間通り"], "answer": "方法"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想提高中文表达____。", "options": ["能力", "速度", "质量", "态度"], "answer": "能力"}, {"type": "mc", "q": "文法「再」の説明として正しいものは？", "options": ["もう一度、またこれから", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "もう一度、またこれから"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["开着", "门"], "answer": "门开着。"}, {"type": "writing", "q": "コーヒーかお茶を飲みたいです。", "answer": "我想喝咖啡或者茶。"}]}, {"day": 14, "title": "Day 14｜HSK4 基礎強化", "vocab": [{"id": "d14-v0", "zh": "服务", "pinyin": "fúwù", "ja": "サービス", "example": "这家店的服务很好。", "exPinyin": "Zhè jiā diàn de fúwù hěn hǎo.", "exJa": "この店のサービスはとても良いです。"}, {"id": "d14-v1", "zh": "价格", "pinyin": "jiàgé", "ja": "価格", "example": "这个价格比我想象的高。", "exPinyin": "Zhège jiàgé bǐ wǒ xiǎngxiàng de gāo.", "exJa": "この価格は思っていたより高いです。"}, {"id": "d14-v2", "zh": "味道", "pinyin": "wèidào", "ja": "味", "example": "这个菜味道不错。", "exPinyin": "Zhège cài wèidào búcuò.", "exJa": "この料理は味が悪くありません。"}, {"id": "d14-v3", "zh": "辣椒", "pinyin": "làjiāo", "ja": "唐辛子", "example": "孩子也要吃，请少放一点辣椒。", "exPinyin": "Háizi yě yào chī, qǐng shǎo fàng yìdiǎn làjiāo.", "exJa": "子どもも食べるので、唐辛子を少なめにしてください。"}, {"id": "d14-v4", "zh": "调整", "pinyin": "tiáozhěng", "ja": "調整する", "example": "这个时间可以调整一下吗？", "exPinyin": "Zhège shíjiān kěyǐ tiáozhěng yíxià ma?", "exJa": "この時間を少し調整できますか。"}], "grammar": [{"id": "d14-g0", "name": "就", "pinyin": "jiù", "meaning": "もう、すぐ、たった", "explain": "就は早さ・少なさ・当然の結果を表します。", "contrast": "八点就到 は8時にはもう着いた。", "mistake": "才との対比で覚えると便利です。", "example": "我马上就到。", "exPinyin": "Wǒ mǎshàng jiù dào.", "exJa": "すぐ着きます。", "test": "彼は7時にはもう出発しました。", "answer": "他七点就出发了。"}, {"id": "d14-g1", "name": "才と就", "pinyin": "cái/jiù", "meaning": "遅い/早いの感覚", "explain": "同じ時間でも才と就で話し手の感じ方が逆です。", "contrast": "九点才到 は遅い、九点就到 は早い。", "mistake": "訳より話者の気持ちを意識します。", "example": "他晚上十点才回家。", "exPinyin": "Tā wǎnshang shí diǎn cái huí jiā.", "exJa": "彼は夜10時になってやっと帰宅しました。", "test": "私は5分で着きます。", "answer": "我五分钟就到。"}, {"id": "d14-g2", "name": "有点儿と一点儿", "pinyin": "yǒudiǎnr/yìdiǎnr", "meaning": "少し〜/少しの量", "explain": "有点儿は形容詞の前、一点儿は量や程度を表します。", "contrast": "有点儿贵、少放一点儿辣椒。", "mistake": "手续一点麻烦ではなく，手续有点儿麻烦。", "example": "这个手续有点儿麻烦。", "exPinyin": "Zhège shǒuxù yǒudiǎnr máfan.", "exJa": "この手続きは少し面倒です。", "test": "辛さを少し控えてください。", "answer": "请少放一点儿辣椒。"}], "test": [{"type": "mc", "q": "「服务」の意味は？", "options": ["担当する", "断る", "同意する", "サービス"], "answer": "サービス"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n这个____比我想象的高。", "options": ["价格", " hěn fāngbiàn.", "exJa": "上海から高速鉄道で杭州へ行くのは便利です。"}], "grammar": [{"id": "d17-g0", "name": "让：使役", "pinyin": "ràng", "meaning": "〜させる、〜してもらう", "explain": "让＋人＋動詞で、誰かに何かをさせる/してもらう意味です。", "contrast": "他让我等一下。", "mistake": "日本語の「〜してもらう」に近い時もあります。", "example": "经理让我明天再联系他。", "exPinyin": "Jīnglǐ ràng wǒ míngtiān zài liánxì tā.", "exJa": "マネージャーは明日また連絡するよう私に言いました。", "test": "先生は私にもう一度読むよう言いました。", "answer": "老师让我再读一遍。"}, {"id": "d17-g1", "name": "被：受け身", "pinyin": "bèi", "meaning": "〜される", "explain": "被は受け身を表します。", "contrast": "我的手机被孩子拿走了。", "mistake": "中国語は日本語ほど受け身を多用しません。", "example": "我的手机被孩子拿走了。", "exPinyin": "Wǒ de shǒujī bèi háizi ná zǒu le.", "exJa": "私のスマホは子どもに持っていかれました。", "test": "資料はマネージャーに直されました。", "answer": "资料被经理改了。"}, {"id": "d17-g2", "name": "给：対象", "pinyin": "gěi", "meaning": "〜に、〜してあげる", "explain": "给＋人で動作の相手を表します。", "contrast": "我给你发地址。", "mistake": "あげるだけでなく、相手を示す前置詞として使います。", "example": "我给你发个地址。", "exPinyin": "Wǒ gěi nǐ fā ge dìzhǐ.", "exJa": "住所をあなたに送ります。", "test": "午後私に電話してください。", "answer": "下午给我打电话。"}], "test": [{"type": "mc", "q": "「定位」の意味は？", "options": ["位置情報", "チェックする", "前倒しする", "整理する"], "answer": "位置情報"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n请扫这个____。", "options": ["二维码", "外卖", "地铁", "高铁"], "answer": "二维码"}, {"type": "mc", "q": "文法「让：使役」の説明として正しいものは？", "options": ["〜させる、〜してもらう", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜させる、〜してもらう"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["中文", "说得", "我", "自然", "还不太"], "answer": "我中文说得还不太自然。"}, {"type": "writing", "q": "資料はマネージャーに直されました。", "answer": "资料被经理改了。"}]}, {"day": 18, "title": "Day 18｜HSK4 基礎強化", "vocab": [{"id": "d18-v0", "zh": "打车", "pinyin": "dǎchē", "ja": "タクシーに乗る/呼ぶ", "example": "下雨天打车不太容易。", "exPinyin": "Xiàyǔ tiān dǎchē bú tài róngyì.", "exJa": "雨の日はタクシーを呼ぶのがあまり簡単ではありません。"}, {"id": "d18-v1", "zh": "堵车", "pinyin": "dǔchē", "ja": "渋滞する", "example": "今天路上堵车很严重。", "exPinyin": "Jīntiān lùshang dǔchē hěn yánzhòng.", "exJa": "今日は道の渋滞がひどいです。"}, {"id": "d18-v2", "zh": "迟到", "pinyin": "chídào", "ja": "遅刻する", "example": "我今天早上差点儿迟到。", "exPinyin": "Wǒ jīntiān zǎoshang chàdiǎnr chídào.", "exJa": "今朝、危うく遅刻するところでした。"}, {"id": "d18-v3", "zh": "加班", "pinyin": "jiābān", "ja": "残業する", "example": "今天可能要加班。", "exPinyin": "Jīntiān kěnéng yào jiābān.", "exJa": "今日は残業になるかもしれません。"}, {"id": "d18-v4", "zh": "出差", "pinyin": "chūchāi", "ja": "出張する", "example": "我下周要去北京出差。", "exPinyin": "Wǒ xià zhōu yào qù Běijīng chūchāi.", "exJa": "来週北京に出張します。"}], "grammar": [{"id": "d18-g0", "name": "跟：相手", "pinyin": "gēn", "meaning": "〜と", "explain": "跟は一緒に行動する相手や相談相手を表します。", "contrast": "跟朋友吃饭、跟经理讨论。", "mistake": "和より口語で自然な場面があります。", "example": "我想跟你讨论一下。", "exPinyin": "Wǒ xiǎng gēn nǐ tǎolùn yíxià.", "exJa": "あなたと少し相談したいです。", "test": "同僚と昼ごはんを食べます。", "answer": "我跟同事吃午饭。"}, {"id": "d18-g1", "name": "对来说", "pinyin": "duì…lái shuō", "meaning": "〜にとって", "explain": "誰かの立場から見た評価を言う時に使います。", "contrast": "对我来说，语法很难。", "mistake": "对我说 は私に言う、对我来说 は私にとって。", "example": "对我来说，中文语顺最难。", "exPinyin": "Duì wǒ lái shuō, Zhōngwén yǔxù zuì nán.", "exJa": "私にとって中国語の語順が一番難しいです。", "test": "外国人にとって手続きは少し面倒です。", "answer": "对外国人来说，手续有点儿麻烦。"}, {"id": "d18-g2", "name": "关于", "pinyin": "guānyú", "meaning": "〜について", "explain": "話題・テーマを示すやや正式な表現です。", "contrast": "关于明天的会议，我有一个问题。", "mistake": "口語では说到もあります。", "example": "关于这个问题，我想再确认一下。", "exPinyin": "Guānyú zhège wèntí, wǒ xiǎng zài quèrèn yíxià.", "exJa": "この問題について、もう一度確認したいです。", "test": "中国語学習について相談したいです。", "answer": "关于中文学习，我想咨询一下。"}], "test": [{"type": "mc", "q": "「打车」の意味は？", "options": ["準備する", "計画する", "タクシーに乗る/呼ぶ", "整理する"], "answer": "タクシーに乗る/呼ぶ"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n今天路上____很严重。", "options": ["堵车", "迟到", "加班", "出差"], "answer": "堵车"}, {"type": "mc", "q": "文法「跟：相手」の説明として正しいものは？", "options": ["〜と", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜と"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["没有时间", "因为", "所以", "没吃午饭", "我"], "answer": "因为没有时间，所以我没吃午饭。"}, {"type": "writing", "q": "外国人にとって手続きは少し面倒です。", "answer": "对外国人来说，手续有点儿麻烦。"}]}, {"day": 19, "title": "Day 19｜HSK4 基礎強化", "vocab": [{"id": "d19-v0", "zh": "报名", "pinyin": "bàomíng", "ja": "申し込む", "example": "我打算报名参加HSK四级考试。", "exPinyin": "Wǒ dǎsuàn bàomíng cānjiā HSK sì jí kǎoshì.", "exJa": "HSK4級試験に申し込むつもりです。"}, {"id": "d19-v1", "zh": "考试", "pinyin": "kǎoshì", "ja": "試験", "example": "这次考试比我想象的难。", "exPinyin": "Zhè cì kǎoshì bǐ wǒ xiǎngxiàng de nán.", "exJa": "今回の試験は思ったより難しいです。"}, {"id": "d19-v2", "zh": "复习", "pinyin": "fùxí", "ja": "復習する", "example": "晚上我想复习今天学的语法。", "exPinyin": "Wǎnshang wǒ xiǎng fùxí jīntiān xué de yǔfǎ.", "exJa": "夜、今日学んだ文法を復習したいです。"}, {"id": "d19-v3", "zh": "预习", "pinyin": "yùxí", "ja": "予習する", "example": "上课之前我会先预习。", "exPinyin": "Shàngkè zhīqián wǒ huì xiān yùxí.", "exJa": "授業の前に先に予習します。"}, {"id": "d19-v4", "zh": "发音", "pinyin": "fāyīn", "ja": "発音", "example": "我的发音还需要多练习。", "exPinyin": "Wǒ de fāyīn hái xūyào duō liànxí.", "exJa": "私の発音はまだもっと練習が必要です。"}], "grammar": [{"id": "d19-g0", "name": "为了", "pinyin": "wèile", "meaning": "〜のために", "explain": "目的を表します。", "contrast": "为了提高中文，我每天练习。", "mistake": "因为は理由、为了は目的です。", "example": "为了提高中文，我每天练习。", "exPinyin": "Wèile tígāo Zhōngwén, wǒ měitiān liànxí.", "exJa": "中国語を上げるために毎日練習しています。", "test": "健康のために歩いて通勤します。", "answer": "为了健康，我走路上班。"}, {"id": "d19-g1", "name": "由于", "pinyin": "yóuyú", "meaning": "〜のために", "explain": "理由を表すやや正式な表現です。", "contrast": "由于天气原因，活动取消。", "mistake": "会話では因为の方が自然な場合も多いです。", "example": "由于下雨，活动取消了。", "exPinyin": "Yóuyú xià yǔ, huódòng qǔxiāo le.", "exJa": "雨のためイベントは中止になりました。", "test": "交通のため少し遅れます。", "answer": "由于交通原因，我会晚一点到。"}, {"id": "d19-g2", "name": "因此", "pinyin": "yīncǐ", "meaning": "したがって", "explain": "前の理由を受けて結果を述べる書き言葉寄りの接続詞です。", "contrast": "他每天练习，因此进步很快。", "mistake": "会話では所以の方が自然なことが多いです。", "example": "他每天练习，因此进步很快。", "exPinyin": "Tā měitiān liànxí, yīncǐ jìnbù hěn kuài.", "exJa": "彼は毎日練習しているので進歩が速いです。", "test": "時間がありません。したがって今日はここまでです。", "answer": "没有时间了，因此今天到这里。"}], "test": [{"type": "mc", "q": "「报名」の意味は？", "options": ["計画する", "比較的、比べる", "選ぶ", "申し込む"], "answer": "申し込む"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n这次____比我想象的难。", "options": ["考试", "复习", "预习", "发音"], "answer": "考试"}, {"type": "mc", "q": "文法「为了」の説明として正しいものは？", "options": ["〜のために", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜のために"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["很忙", "我", "想继续学习", "但是", "虽然"], "answer": "虽然很忙，但是我想继续学习。"}, {"type": "writing", "q": "交通のため少し遅れます。", "answer": "由于交通原因，我会晚一点到。"}]}, {"day": 20, "title": "Day 20｜HSK4 基礎強化", "vocab": [{"id": "d20-v0", "zh": "语法", "pinyin": "yǔfǎ", "ja": "文法", "example": "这个语法点我还不太懂。", "exPinyin": "Zhège yǔfǎ diǎn wǒ hái bú tài dǒng.", "exJa": "この文法ポイントはまだあまり分かりません。"}, {"id": "d20-v1", "zh": "句子", "pinyin": "jùzi", "ja": "文", "example": "请你用这个词造一个句子。", "exPinyin": "Qǐng nǐ yòng zhège cí zào yí ge jùzi.", "exJa": "この単語を使って文を作ってください。"}, {"id": "d20-v2", "zh": "词语", "pinyin": "cíyǔ", "ja": "語句", "example": "今天的词语都很实用。", "exPinyin": "Jīntiān de cíyǔ dōu hěn shíyòng.", "exJa": "今日の語句はどれも実用的です。"}, {"id": "d20-v3", "zh": "听力", "pinyin": "tīnglì", "ja": "リスニング", "example": "我的听力比以前好多了。", "exPinyin": "Wǒ de tīnglì bǐ yǐqián hǎo duō le.", "exJa": "私のリスニングは以前よりずっと良くなりました。"}, {"id": "d20-v4", "zh": "阅读", "pinyin": "yuèdú", "ja": "読解", "example": "阅读题需要仔细看。", "exPinyin": "Yuèdú tí xūyào zǐxì kàn.", "exJa": "読解問題はよく読む必要があります。"}], "grammar": [{"id": "d20-g0", "name": "不过", "pinyin": "búguò", "meaning": "ただし、でも", "explain": "前の内容を受けて、少し反対・補足を言う時に使います。", "contrast": "这件衣服很好看，不过有点儿贵。", "mistake": "但是より柔らかく会話で自然です。", "example": "这家店不错，不过有点儿贵。", "exPinyin": "Zhè jiā diàn búcuò, búguò yǒudiǎnr guì.", "exJa": "この店は悪くないですが、少し高いです。", "test": "便利ですが少し遠いです。", "answer": "很方便，不过有点儿远。"}, {"id": "d20-g1", "name": "而且", "pinyin": "érqiě", "meaning": "しかも、さらに", "explain": "前の内容に追加してもう一つ特徴を言います。", "contrast": "很近，而且便宜。", "mistake": "还有より文と文をつなぐ感じが強いです。", "example": "这里离地铁近，而且很安静。", "exPinyin": "Zhèlǐ lí dìtiě jìn, érqiě hěn ānjìng.", "exJa": "ここは地下鉄に近く、しかも静かです。", "test": "このアプリは便利で見やすいです。", "answer": "这个应用很方便，而且很好看。"}, {"id": "d20-g2", "name": "另外", "pinyin": "lìngwài", "meaning": "それから、別に", "explain": "話題や情報を追加する時に使います。", "contrast": "另外，我还有一个问题。", "mistake": "而且は性質の追加、另外は話題の追加に向いています。", "example": "另外，我想确认一下时间。", "exPinyin": "Lìngwài, wǒ xiǎng quèrèn yíxià shíjiān.", "exJa": "それから、時間を確認したいです。", "test": "それから住所を送ってください。", "answer": "另外，请把地址发给我。"}], "test": [{"type": "mc", "q": "「语法」の意味は？", "options": ["決める", "文法", "試す", "比較的、比べる"], "answer": "文法"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n请你用这个词造一个____。", "options": ["句子", "词语", "听力", "阅读"], "answer": "句子"}, {"type": "mc", "q": "文法「不过」の説明として正しいものは？", "options": ["ただし、でも", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "ただし、でも"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["苏州", "去过", "两次", "我"], "answer": "我去过苏州两次。"}, {"type": "writing", "q": "このアプリは便利で見やすいです。", "answer": "这个应用很方便，而且很好看。"}]}, {"day": 21, "title": "Day 21｜HSK4 基礎強化", "vocab": [{"id": "d21-v0", "zh": "书写", "pinyin": "shūxiě", "ja": "書写", "example": "HSK四级也有书写部分。", "exPinyin": "HSK sì jí yě yǒu shūxiě bùfen.", "exJa": "HSK4級にも書写部分があります。"}, {"id": "d21-v1", "zh": "翻译", "pinyin": "fānyì", "ja": "翻訳する", "example": "这句话可以怎么翻译？", "exPinyin": "Zhè jù huà kěyǐ zěnme fānyì?", "exJa": "この文はどう翻訳できますか。"}, {"id": "d21-v2", "zh": "意思", "pinyin": "yìsi", "ja": "意味", "example": "这个词是什么意思？", "exPinyin": "Zhège cí shì shénme yìsi?", "exJa": "この単語はどういう意味ですか。"}, {"id": "d21-v3", "zh": "想象", "pinyin": "xiǎngxiàng", "ja": "想像する", "example": "事情没有我想象的那么简单。", "exPinyin": "Shìqing méiyǒu wǒ xiǎngxiàng de nàme jiǎndān.", "exJa": "物事は思っていたほど簡単ではありません。"}, {"id": "d21-v4", "zh": "犹豫", "pinyin": "yóuyù", "ja": "ためらう", "example": "说中文的时候，我有时会犹豫。", "exPinyin": "Shuō Zhōngwén de shíhou, wǒ yǒushí huì yóuyù.", "exJa": "中国語を話す時、時々ためらってしまいます。"}], "grammar": [{"id": "d21-g0", "name": "尤其", "pinyin": "yóuqí", "meaning": "特に", "explain": "いくつかある中で特に強調したいものを言う時に使います。", "contrast": "我想提高中文，尤其是口语。", "mistake": "特别と近いですが、尤其は比較対象の中で特に。", "example": "我想提高中文，尤其是口语 let showAnswers=false, bookmarkView=false, selectedChip=null;

if(!localStorage.getItem(storageKey+'-updatedAtMs') && localStorage.getItem(storageKey)) {
  localStorage.setItem(storageKey+'-updatedAtMs', String(Date.now()));
}
// v10 migration: older versions stored order answers as plain strings.
// The tap-order UI expects objects like {idx, word}. Remove old incompatible entries.
if(state.dragOrders){
  Object.keys(state.dragOrders).forEach(k=>{
    const arr=state.dragOrders[k];
    if(!Array.isArray(arr) || arr.some(x=>!x || typeof x!=='object' || !('idx' in x) || !('word' in x))){
      delete state.dragOrders[k];
      if(state.answers) delete state.answers[k];

}

 <div class="small" style="margin-bottom:10px">☆を付けた単語・文法だけを表示しています。</div>
 <button class="primary" data-action="showHome">通常の学習画面に戻る</button>`+
 (items.length?items.map(b=>`<div class="vitem"><div class="item-head"><div><span class="badge">${esc(b.type)}</span><span class="badge">Day ${b.day}</span><div class="zh">${esc(b.title)}</div><div class="small">${esc(b.sub||'')}</div></div><button class="bookmark active" data-action="removeBookmark" data-id="${b.id}">★</button></div></div>`).join(''):`<div class="empty">まだブックマークがありません。単語・文法の右上の ☆ を押すとここに集まります。</div>`);
}

function renderHome(){
 if($('bottomNav')) $('bottomNav').style.display='none';
 save(); initSelect(); renderBookmarkPanel();
 bookmarkView=false;
 $('bookmarkPanel').className='bookmark-panel card';
 const c=$('content');
 c.style.display='';
 c.className='';
 const doneCount=Object.keys(state.completed||{}).filter(k=>state.completed[k]).length;
 const percent=Math.round(doneCount/LESSONS.length*100);
 const nextDay=Math.min(LESSONS.length, Math.max(1, doneCount+1));
 c.innerHTML=`
  <div class="card">
   <div class="section-title"><h2>ホーム</h2><span class="badge">${doneCount}/${LESSONS.length} 完了</span></div>
   <div class="small">ここから今日の学習、続き、ブックマーク、各Dayに移動できます。</div>
   <div class="progressline"><span style="width:${percent}%"></span></div>
   <div class="small" style="margin-top:6px">進捗：${percent}%</div>
  </div>
  <div class="home-grid">
    <div class="home-card">
      <h3>前回からの続き</h3>
      <div class="small">まだ完了していない最初のDayへ移動します。</div>
      <div class="home-actions">
        <button class="primary" onclick="showDay(${nextDay})">Day ${nextDay} を開く</button>
        <button onclick="showDay(${current})">前回のDay</button>
      </div>
    </div>
    <div class="home-card">
      <h3>ブックマーク復習</h3>
      <div class="small">☆を付けた単語・文法だけを見返します。</div>
      <div class="home-actions">
        <button data-action="showBookmarks">ブックマークを見る</button>
        <button data-action="toggleBookmarkHint">使い方</button>
      </div>
      <div id="bookmarkHint" class="small" style="display:none;margin-top:8px">各単語・文法の右上の ☆ を押すと、ブックマークに追加されます。</div>
    </div>
  </div>
  <div class="card">
    <div class="section-title"><h2>Day一覧</h2><span class="badge">1〜90</span></div>
    <div class="small">完了済みのDayは緑で表示されます。</div>
    <div class="day-grid">
      ${LESSONS.map(l=>`<button class="daybtn ${state.completed[l.day]?'done':''}" onclick="showDay(${l.day})">${l.day}${state.completed[l.day]?'✓':''}</button>`).join('')}
    </div>
  </div>`;
 updateCompleteButtons();
}
function toggleBookmarkHint(){
 const el=$('bookmarkHint');
 if(el) el.style.display=el.style.display==='none'?'block':'none';
}

function render(){
 if(homeView){ renderHome(); return; }
 save(); initSelect(); renderBookmarkPanel();
 if($('bottomNav')) $('bottomNav').style.display='flex';
 const l=lesson(); const c=$('content');
 if(bookmarkView){
   c.style.display='none';
   updateCompleteButtons();
   return;
 }
 c.style.display='';
 c.className=showAnswers?'show-answers':'';
 c.innerHTML=`
  <div class="card">
   <div class="section-title"><h2>${esc(l.title)}</h2><span class="badge">${state.completed[l.day]?'完了済み':'未完了'}</span></div>
   <div class="small">今日の内容：単語5個・文法3つ・ミニテスト5問</div>
   ${state.scores[l.day]!=null?`<div class="scorebox">前回のミニテスト：<b>自動採点 ${state.scores[l.day]}/4</b> ＋ 作文1問</div>`:''}
  </div>
  <div class="card">
   <div class="section-title"><h2>単語5個</h2><span class="badge">重複なし</span></div>
   <div class="vocab">${l.vocab.map((v,i)=>`
    <div class="vitem">
     <div class="item-head"><div><div class="zh">${i+1}. ${esc(v.zh)}</div><div class="pinyin">${esc(v.pinyin)}</div><div class="ja">${esc(v.ja)}</div></div>
     <button class="bookmark ${isBookmarked(v.id)?'active':''}" onclick="toggleBookmark('${v.id}','単語','${esc(v.zh)}','${esc(v.pinyin)}｜${esc(v.ja)}')">${isBookmarked(v.id)?'★':'☆'}</button></div>
     <div class="ex">${esc(v.example)}</div><div class="pinyin expinyin">${esc(v.exPinyin)}</div><div class="ja exja">${esc(v.exJa)}</div>
    </div>`).join('')}</div>
  </div>
  <div class="card">
   <div class="section-title"><h2>文法3つ</h2><span class="badge">解説強化</span></div>
   ${l.grammar.map((g,i)=>`
    <div class="gitem">
     <div class="item-head"><div><h3>${i+1}. ${esc(g.name)}</h3><div class="pinyin">${esc(g.pinyin)}</div><div class="ja"><span class="label">意味：</span>${esc(g.meaning)}</div></div>
     <button class="bookmark ${isBookmarked(g.id)?'active':''}" onclick="toggleBookmark('${g.id}','文法','${esc(g.name)}','${esc(g.meaning)}')">${isBookmarked(g.id)?'★':'☆'}</button></div>
     <div class="note"><span class="label">解説：</span>${esc(g.explain)}</div>
     <div class="note"><span class="label">違い・注意：</span>${esc(g.contrast)}</div>
     <div class="note"><span class="label">日本人が間違えやすい点：</span>${esc(g.mistake)}</div>
     <div class="ex"><span class="label">例文：</span>${esc(g.example)}</div><div class="pinyin expinyin">${esc(g.exPinyin)}</div><div class="ja exja">${esc(g.exJa)}</div>
    </div>`).join('')}
  </div>
  <div class="card" id="testCard">
   <div class="section-title"><h2>今日のミニテスト</h2><button onclick="gradeTest()" class="primary">採点する</button></div>
   <div id="testArea">${renderTest(l)}</div><div id="scoreArea"></div>
  </div>`;
 setupDrag();
 updateCompleteButtons();
}
function renderTest(l){
 return l.test.map((q,i)=>{
  const key=`d${l.day}q${i}`;
  if(q.type==='mc'){
   return `<div class="testq"><b>Q${i+1}.</b> ${esc(q.q).replaceAll('\\n','<br>')}
    <div class="opts">${q.options.map(o=>`<label class="opt"><input type="radio" name="${key}" value="${esc(o)}" ${state.answers[key]===o?'checked':''} onchange="state.answers['${key}']=this.value;save()"> ${esc(o)}</label>`).join('')}</div>
    <div class="answer">正解：<span class="good">${esc(q.answer)}</span></div></div>`;
  }
  if(q.type==='drag'){
   const selected=(state.dragOrders[key]||[]).filter(x=>x && typeof x==='object' && 'idx' in x && 'word' in x);
   state.dragOrders[key]=selected;
   const selectedKeys=new Set(selected.map(x=>x.idx));
   return `<div class="testq"><b>Q${i+1}.</b> 語句を正しい順番にタップしてください。
    <div class="small muted">上の候補をタップすると、下の回答欄に順番に入ります。間違えたら「1つ戻す」か「語順リセット」。</div>
    <div class="drag-area" data-key="${key}">
      ${q.words.map((w,idx)=>`<button type="button" class="chip ${selectedKeys.has(idx)?'used':''}" onclick="selectOrderChip('${key}', ${idx}, '${esc(w)}')" ${selectedKeys.has(idx)?'disabled':''}>${esc(w)}</button>`).join('')}
    </div>
    <div class="answer-area">
      ${selected.length?selected.map((x,n)=>`<span class="chip answer-chip">${n+1}. ${esc(x.word)}</span>`).join(''):'<span class="small muted">ここにタップした順で語句が入ります</span>'}
    </div>
    <input type="text" readonly value="${esc(state.answers[key]||'')}" placeholder="タップした語順がここに入ります">
    <div class="row" style="margin-top:8px">
      <button type="button" onclick="undoOrderChip('${key}')">1つ戻す</button>
      <button type="button" onclick="resetOrderChips('${key}')">語順リセット</button>
    </div>
    <div class="answer">参考解答：<span class="good">${esc(q.answer)}</span></div></div>`;
  }
  return `<div class="testq"><b>Q${i+1}.</b> ${esc(q.q)}
    <textarea placeholder="ここに作文を入力" oninput="state.answers['${key}']=this.value;save()">${esc(state.answers[key]||'')}</textarea>
    <div class="answer">参考解答：<span class="good">${esc(q.answer)}</span><div class="small muted">作文は参考解答と比べて自己採点してください。</div></div></div>`;
 }).join('');
}
function syncDrag(area){
 const key=area.dataset.key;
 const words=[...area.querySelectorAll('.chip')].map(x=>x.dataset.word);
 state.dragOrders[key]=words;
 state.answers[key]=words.join('');
 const input=area.parentElement.querySelector('input[type=text]');
 if(input) input.value=state.answers[key];
 save();
}
function selectOrderChip(key, idx, word){
 if(!state.dragOrders[key]) state.dragOrders[key]=[];
 if(state.dragOrders[key].some(x=>x.idx===idx)) return;
 state.dragOrders[key].push({idx, word});
 state.answers[key]=state.dragOrders[key].map(x=>x.word).join('');
 save();
 render();
}
function undoOrderChip(key){
 if(state.dragOrders[key] && state.dragOrders[key].length){
   state.dragOrders[key].pop();
   state.answers[key]=state.dragOrders[key].map(x=>x.word).join('');
   save();
   render();
 }
}
function resetOrderChips(key){
 state.dragOrders[key]=[];
 state.answers[key]='';
 save();
 render();
}
function setupDrag(){
 // iPhoneのファイルプレビューではHTML5ドラッグが効きにくいため、
 // v9ではドラッグではなく「タップした順に並べる」方式に変更。
}
function norm(s){return String(s||'').replace(/[，。！？、,.!?\s]/g,'').toLowerCase()}
function gradeTest(){
 const l=lesson(); let score=0,total=4;
 l.test.forEach((q,i)=>{ if(q.type==='writing')return; const key=`d${l.day}q${i}`; if(norm(state.answers[key])===norm(q.answer)) score++; });
 state.scores[l.day]=score; save();
 const msg=score===4?'很好！自動採点部分は満点です。':score===3?'不错。1問だけ復習しましょう。':score===2?'もう一歩。文法解説を読み直すと伸びます。':'復習優先。今日は単語と文法例文を音読しましょう。';
 $('scoreArea').innerHTML=`<div class="scorebox">ミニテスト：<b>自動採点 ${score}/${total}</b> ＋ 作文1問<br>${msg}<br><span class="small muted">全5問中、Q1〜Q4は自動採点、Q5作文は参考解答と見比べて自己採点してください。</span></div>`;
 showAnswers=true; $('answerBtn').textContent='解答を隠す'; $('answerBtn').className='toggle on'; $('content').className='show-answers';
}
function setDay(d){homeView=false;current=Math.max(1,Math.min(LESSONS.length,d));showAnswers=false;$('answerBtn').textContent='解答を表示';$('answerBtn').className='toggle off';render();window.scrollTo({top:0,behavior:'smooth'})}
function updateCompleteButtons(){
 const done=!!state.completed[current];
 $('completeBtn').textContent=done?'完了済み：未完了に戻す':'このDayを完了にする';
 $('completeBtn').className='complete'+(done?' active':'');
 $('bottomComplete').textContent=done?'完了済み':'完了';
 $('bottomComplete').className='complete'+(done?' active':'');
}
function toggleComplete(){state.completed[current]=!state.completed[current];save();render();}
$('homeBtn').onclick=()=>{homeView=true;bookmarkView=false;render();window.scrollTo({top:0,behavior:'smooth'});};
$('daySelect').onchange=e=>setDay(Number(e.target.value));
$('prevBtn').onclick=()=>setDay(current-1); $('nextBtn').onclick=()=>setDay(current+1);
$('bottomPrev').onclick=()=>setDay(current-1); $('bottomNext').onclick=()=>setDay(current+1);
$('completeBtn').onclick=toggleComplete; $('bottomComplete').onclick=toggleComplete;
$('pinyinBtn').onclick=()=>{document.body.classList.toggle('hidden-pinyin'); const hidden=document.body.classList.contains('hidden-pinyin'); $('pinyinBtn').textContent=hidden?'拼音を表示':'拼音を隠す'; $('pinyinBtn').className='toggle '+(hidden?'on':'off');}
$('jaBtn').onclick=()=>{document.body.classList.toggle('hidden-ja'); const hidden=document.body.classList.contains('hidden-ja'); $('jaBtn').textContent=hidden?'日本語訳を表示':'日本語訳を隠す'; $('jaBtn').className='toggle '+(hidden?'on':'off');}
$('answerBtn').onclick=()=>{showAnswers=!showAnswers;$('answerBtn').textContent=showAnswers?'解答を隠す':'解答を表示';$('answerBtn').className='toggle '+(showAnswers?'on':'off');$('content').className=showAnswers?'show-answers':''}
let _prevHomeView=false;
$('bookmarkViewBtn').onclick=()=>{
  if(!bookmarkView){
    _prevHomeView=homeView;
    homeView=false;
    bookmarkView=true;
  } else {
    homeView=_prevHomeView;
    bookmarkView=false;
  }
  render();
  window.scrollTo({top:0,behavior:'smooth'});
};

// Expose module-scoped functions for inline handlers.
// This is necessary because this file uses <script type="module"> for Firebase imports.
function showDay(d){ bookmarkView=false; homeView=false; setDay(Number(d)); }
function showBookmarks(){ bookmarkView=true; homeView=false; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function showHome(){ bookmarkView=false; homeView=true; render(); window.scrollTo({top:0,behavior:'smooth'}); }
Object.assign(window, {
  state,
  save,
  render,
  setDay,
  showDay,
  showHome,
  showBookmarks,
  toggleBookmark,
  toggleBookmarkHint,
  gradeTest,
  selectOrderChip,
  undoOrderChip,
  resetOrderChips
});

render();

// ---- Service Worker 登録 (PWA オフライン対応) ----
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}

// ---- イベント委譲: data-action ボタンをまとめて処理 (iOS 対応) ----
document.addEventListener('click', function(e){
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if(action === 'showHome')           showHome();
  else if(action === 'showBookmarks') showBookmarks();
  else if(action === 'toggleBookmarkHint') toggleBookmarkHint();
  else if(action === 'removeBookmark' && id) toggleBookmark(id);
});
</script>
</body></html>
