<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>HSK4 90日ミニアプリ v4</title>
<style>
:root{--bg:#f7f8fb;--card:#fff;--ink:#111827;--muted:#667085;--line:#e5e7eb;--accent:#111827;--good:#16a34a;--goodbg:#ecfdf3;--goodline:#abefc6;--bad:#dc2626;--gray:#f2f4f7}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(180deg,#f8fafc,#fff);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Segoe UI,sans-serif}
.app{max-width:980px;margin:0 auto;padding:18px 12px 90px}.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:calc(18px + env(safe-area-inset-top)) 16px 14px}.top-inner{max-width:980px;margin:0 auto}
h1{font-size:20px;margin:0 0 14px;letter-spacing:-.03em;line-height:1.2}.small{font-size:12px;color:var(--muted);line-height:1.45}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
select,button,input,textarea{font:inherit}select{flex:1;min-width:180px;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}
button{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 12px;font-weight:700;color:var(--ink)}button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button.complete.active{background:var(--goodbg);color:#067647;border-color:var(--goodline)}button.toggle.off{background:#fff;color:var(--ink)}button.toggle.on{background:var(--gray);color:#475467}
button.bookmark{padding:7px 9px;border-radius:999px;background:#fff;color:#98a2b3}button.bookmark.active{background:#fffbeb;border-color:#fedf89;color:#b54708}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 24px rgba(16,24,40,.05);padding:16px;margin:12px 0}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.section-title h2{font-size:18px;margin:0}.badge{display:inline-flex;border-radius:999px;background:#f2f4f7;color:#344054;padding:4px 8px;font-size:12px;font-weight:700}
.vocab{display:grid;gap:10px}.vitem{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.zh{font-size:20px;font-weight:800}.pinyin{color:#475467;margin-top:2px}.ja{color:#344054;margin-top:4px}.ex{margin-top:10px;line-height:1.55}
.gitem{border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0;background:#fff}.gitem h3{margin:0 0 6px;font-size:17px}.label{font-weight:800;color:#344054}.note{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:14px;padding:10px;margin-top:8px;line-height:1.55}
.testq{border-top:1px solid var(--line);padding:14px 0}.testq:first-child{border-top:0}.opts{display:grid;gap:8px;margin-top:8px}.opt{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}
textarea,input[type=text]{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:8px;background:#fff;min-height:44px}textarea{min-height:88px;resize:vertical}
.answer{display:none;margin-top:8px;border-radius:14px;background:#f8fafc;border:1px dashed #cbd5e1;padding:10px}.show-answers .answer{display:block}
.hidden-ja .ja,.hidden-ja .exja{display:none}.hidden-pinyin .pinyin,.hidden-pinyin .expinyin{display:none}.scorebox{background:#fffbeb;border:1px solid #fedf89;border-radius:16px;padding:12px;margin-top:12px}.good{color:var(--good);font-weight:800}.bad{color:var(--bad);font-weight:800}.muted{color:var(--muted)}
.drag-area{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding:10px;border:1px dashed #cbd5e1;border-radius:16px;background:#f8fafc;min-height:58px}
.answer-area{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding:10px;border:1px solid #d0d5dd;border-radius:16px;background:#fff;min-height:58px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:9px 12px;border-radius:14px;background:white;border:1px solid var(--line);font-weight:800;box-shadow:0 2px 6px rgba(16,24,40,.05);touch-action:manipulation}
.chip.used{background:#eef2f6;color:#98a2b3;text-decoration:line-through}
.chip.answer-chip{background:#111827;color:white;border-color:#111827}
.chip.dragging{opacity:.45}.chip.selected{outline:3px solid #c7d2fe}
.bookmark-panel{display:none}.bookmark-panel.active{display:block}.empty{padding:14px;border:1px dashed #cbd5e1;border-radius:16px;background:#f8fafc;color:var(--muted)}
.home-grid{display:grid;gap:12px}.home-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;box-shadow:0 4px 14px rgba(16,24,40,.04)}
.home-card h3{margin:0 0 6px;font-size:17px}.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}.daybtn{padding:10px 0;border-radius:12px;background:#fff}.daybtn.done{background:var(--goodbg);border-color:var(--goodline);color:#067647}
.progressline{height:10px;border-radius:999px;background:#eef2f6;overflow:hidden;margin-top:8px}.progressline span{display:block;height:100%;background:#111827;width:0%}
@media(min-width:700px){.home-grid{grid-template-columns:1fr 1fr}.day-grid{grid-template-columns:repeat(10,1fr)}}
.bottomnav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 12px;display:flex;gap:8px;z-index:20}.bottomnav button{flex:1}
@media(max-width:430px){.top{padding:calc(20px + env(safe-area-inset-top)) 14px 14px}h1{font-size:21px;margin-bottom:16px}button{padding:10px 11px}.app{padding-top:20px}}@media(min-width:800px){.vocab{grid-template-columns:1fr 1fr}.top h1{font-size:28px}.app{padding-bottom:40px}.bottomnav{display:none}}
</style>
</head>
<body class="hidden-pinyin">
<div class="top">
 <div class="top-inner">
  <h1>HSK4 90日ミニアプリ</h1>
  <div class="row">
   <button id="homeBtn">ホーム</button><button id="prevBtn">前</button>
   <select id="daySelect"></select>

  <div class="small" style="margin-top:6px">語順問題は、候補チップを正しい順番にタップして並べます。iPhoneでも安定して使える方式にしました。</div>
 </div>
</div>

</div>

 <button id="bottomNext">次</button>
</div>

<script>
const LESSONS=[{"day": 1, "title": "Day 1｜HSK4 基礎強化", "vocab": [{"id": "d1-v0", "zh": "水平", "pinyin": "shuǐpíng", "ja": "レベル、能力水準", "example": "我的中文水平还不够高。", "exPinyin": "Wǒ de Zhōngwén shuǐpíng hái bú gòu gāo.", "exJa": "私の中国語レベルはまだ十分高くありません。"}, {"id": "d1-v1", "zh": "提高", "pinyin": "tígāo", "ja": "高める、向上させる", "example": "我想提高中文会话能力。", "exPinyin": "Wǒ xiǎng tígāo Zhōngwén huìhuà nénglì.", "exJa": "中国語の会話力を上げたいです。"}, {"id": "d1-v2", "zh": "方便", "pinyin": "fāngbiàn", "ja": "便利だ、都合がよい", "example": "在上海生活很方便。", "exPinyin": "Zài Shànghǎi shēnghuó hěn fāngbiàn.", "exJa": "上海での生活は便利です。"}, {"id": "d1-v3", "zh": "复杂", "pinyin": "fùzá", "ja": "複雑だ", "example": "这个问题比我想象的复杂。", "exPinyin": "Zhège wèntí bǐ wǒ xiǎngxiàng de fùzá.", "exJa": "この問題は思っていたより複雑です。"}, {"id": "d1-v4", "zh": "表达", "pinyin": "biǎodá", "ja": "表現する", "example": "我想更自然地表达自己的想法。", "exPinyin": "Wǒ xiǎng gèng zìrán de biǎodá zìjǐ de xiǎngfǎ.", "exJa": "自分の考えをもっと自然に表現したいです。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送ってください。", "test": "住所を私に送ってください。", "answer": "请把地址发给我。", "id": "d1-g0"}, {"name": "動詞 + 得 + 程度", "pinyin": "dòngcí + de + chéngdù", "meaning": "どの程度〜するか", "explain": "動詞の後に得を置き、その後ろで程度を説明します。話すのが自然、走るのが速い、作るのが上手い、などに使います。", "contrast": "我说中文＝中国語を話す。 我中文说得很好＝中国語を話すのが上手い。", "mistake": "我讲中文自然 より 我中文说得很自然 が自然です。", "example": "我中文说得还不太自然。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d1-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d1-g2"}], "test": [{"type": "mc", "q": "「水平」の意味は？", "options": ["表現する", "レベル、能力水準", "複雑だ", "便利だ、都合がよい"], "answer": "レベル、能力水準"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____中文会话能力。", "options": ["提高", "方便", "复杂", "表达"], "answer": "提高"}, {"type": "mc", "q": "文法「把構文」の説明として正しいものは？", "options": ["目的語をどう処理したか", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "目的語をどう処理したか"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["说得", "还不太", "自然", "中文", "我"], "answer": "我中文说得还不太自然。"}, {"type": "writing", "q": "彼は話すのがとても速いです。", "answer": "他说得很快。"}]}, {"day": 2, "title": "Day 2｜HSK4 基礎強化", "vocab": [{"id": "d2-v0", "zh": "适合", "pinyin": "shìhé", "ja": "合う、適している", "example": "这件衣服很适合你。", "exPinyin": "Zhè jiàn yīfu hěn shìhé nǐ.", "exJa": "この服はあなたにとても似合っています。"}, {"id": "d2-v1", "zh": "继续", "pinyin": "jìxù", "ja": "続ける", "example": "我们继续学习下一课吧。", "exPinyin": "Wǒmen jìxù xuéxí xià yí kè ba.", "exJa": "次の課を続けて勉強しましょう。"}, {"id": "d2-v2", "zh": "只好", "pinyin": "zhǐhǎo", "ja": "仕方なく〜する", "example": "地铁停了，我只好打车回家。", "exPinyin": "Dìtiě tíng le, wǒ zhǐhǎo dǎchē huí jiā.", "exJa": "地下鉄が止まったので、仕方なくタクシーで帰りました。"}, {"id": "d2-v3", "zh": "及时", "pinyin": "jíshí", "ja": "タイムリーに、すぐに", "example": "如果有问题，请及时联系我。", "exPinyin": "Rúguǒ yǒu wèntí, qǐng jíshí liánxì wǒ.", "exJa": "問題があれば、すぐに私に連絡してください。"}, {"id": "d2-v4", "zh": "联系", "pinyin": "liánxì", "ja": "連絡する", "example": "有问题请随时联系我。", "exPinyin": "Yǒu wèntí qǐng suíshí liánxì wǒ.", "exJa": "問題があればいつでも連絡してください。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d2-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d2-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d2-g2"}], "test": [{"type": "mc", "q": "「适合」の意味は？", "options": ["表現する", "続ける", "仕方なく〜する", "合う、適している"], "answer": "合う、適している"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我们____学习下一课吧。", "options": ["继续", "只好", "及时", "联系"], "answer": "继续"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["没有时间", "所以", "因为", "我", "没吃午饭"], "answer": "因为没有时间，所以我没吃午饭。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 3, "title": "Day 3｜HSK4 基礎強化", "vocab": [{"id": "d3-v0", "zh": "习惯", "pinyin": "xíguàn", "ja": "慣れる、習慣", "example": "我已经习惯在上海生活了。", "exPinyin": "Wǒ yǐjīng xíguàn zài Shànghǎi shēnghuó le.", "exJa": "私はもう上海での生活に慣れました。"}, {"id": "d3-v1", "zh": "安排", "pinyin": "ānpái", "ja": "手配する、段取りする", "example": "我已经安排好了明天的会议。", "exPinyin": "Wǒ yǐjīng ānpái hǎo le míngtiān de huìyì.", "exJa": "明日の会議はすでに手配してあります。"}, {"id": "d3-v2", "zh": "提醒", "pinyin": "tíxǐng", "ja": "リマインドする、注意するように言う", "example": "请提醒我下午三点开会。", "exPinyin": "Qǐng tíxǐng wǒ xiàwǔ sān diǎn kāihuì.", "exJa": "午後3時の会議を私にリマインドしてください。"}, {"id": "d3-v3", "zh": "影响", "pinyin": "yǐngxiǎng", "ja": "影響する", "example": "天气会影响心情。", "exPinyin": "Tiānqì huì yǐngxiǎng xīnqíng.", "exJa": "天気は気分に影響します。"}, {"id": "d3-v4", "zh": "解决", "pinyin": "jiějué", "ja": "解決する", "example": "这个问题很容易解决。", "exPinyin": "Zhège wèntí hěn róngyì jiějué.", "exJa": "この問題は簡単に解決できます。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d3-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d3-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d3-g2"}], "test": [{"type": "mc", "q": "「习惯」の意味は？", "options": ["タイムリーに、すぐに", "慣れる、習慣", "仕方なく〜する", "続ける"], "answer": "慣れる、習慣"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我已经____好了明天的会议。", "options": ["安排", "提醒", "影响", "解决"], "answer": "安排"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["想继续学习", "很忙", "虽然", "但是", "我"], "answer": "虽然很忙，但是我想继续学习。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 4, "title": "Day 4｜HSK4 基礎強化", "vocab": [{"id": "d4-v0", "zh": "发生", "pinyin": "fāshēng", "ja": "起こる、発生する", "example": "昨天发生了一件很有意思的事。", "exPinyin": "Zuótiān fāshēng le yí jiàn hěn yǒuyìsi de shì.", "exJa": "昨日、とても面白いことが起こりました。"}, {"id": "d4-v1", "zh": "处理", "pinyin": "chǔlǐ", "ja": "処理する、対応する", "example": "这个问题需要马上处理。", "exPinyin": "Zhège wèntí xūyào mǎshàng chǔlǐ.", "exJa": "この問題はすぐに対応する必要があります。"}, {"id": "d4-v2", "zh": "结果", "pinyin": "jiéguǒ", "ja": "結果、その結果", "example": "他没来，结果我们自己开始了。", "exPinyin": "Tā méi lái, jiéguǒ wǒmen zìjǐ kāishǐ le.", "exJa": "彼は来なかったので、結局私たちだけで始めました。"}, {"id": "d4-v3", "zh": "赶紧", "pinyin": "gǎnjǐn", "ja": "急いで、早く", "example": "快迟到了，我们赶紧走吧。", "exPinyin": "Kuài chídào le, wǒmen gǎnjǐn zǒu ba.", "exJa": "遅れそうだから、急いで行きましょう。"}, {"id": "d4-v4", "zh": "讨论", "pinyin": "tǎolùn", "ja": "議論する、相談する", "example": "这个问题我想再讨论一下。", "exPinyin": "Zhège wèntí wǒ xiǎng zài tǎolùn yíxià.", "exJa": "この問題をもう少し相談したいです。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d4-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d4-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d4-g2"}], "test": [{"type": "mc", "q": "「发生」の意味は？", "options": ["連絡する", "起こる、発生する", "慣れる、習慣", "タイムリーに、すぐに"], "answer": "起こる、発生する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n这个问题需要马上____。", "options": ["处理", "结果", "赶紧", "讨论"], "answer": "处理"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["去过", "苏州", "我", "两次"], "answer": "我去过苏州两次。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 5, "title": "Day 5｜HSK4 基礎強化", "vocab": [{"id": "d5-v0", "zh": "几乎", "pinyin": "jīhū", "ja": "ほとんど", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d5-v1", "zh": "手续", "pinyin": "shǒuxù", "ja": "手続き", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d5-v2", "zh": "麻烦", "pinyin": "máfan", "ja": "面倒だ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d5-v3", "zh": "流利", "pinyin": "liúlì", "ja": "流暢だ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d5-v4", "zh": "自然", "pinyin": "zìrán", "ja": "自然だ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送ってください。", "test": "住所を私に送ってください。", "answer": "请把地址发给我。", "id": "d5-g0"}, {"name": "動詞 + 得 + 程度", "pinyin": "dòngcí + de + chéngdù", "meaning": "どの程度〜するか", "explain": "動詞の後に得を置き、その後ろで程度を説明します。話すのが自然、走るのが速い、作るのが上手い、などに使います。", "contrast": "我说中文＝中国語を話す。 我中文说得很好＝中国語を話すのが上手い。", "mistake": "我讲中文自然 より 我中文说得很自然 が自然です。", "example": "我中文说得还不太自然。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d5-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d5-g2"}], "test": [{"type": "mc", "q": "「几乎」の意味は？", "options": ["ほとんど", "慣れる、習慣", "リマインドする、注意するように言う", "手配する、段取りする"], "answer": "ほとんど"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["手续", "麻烦", "流利", "自然"], "answer": "手续"}, {"type": "mc", "q": "文法「把構文」の説明として正しいものは？", "options": ["目的語をどう処理したか", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "目的語をどう処理したか"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["开着", "门"], "answer": "门开着。"}, {"type": "writing", "q": "彼は話すのがとても速いです。", "answer": "他说得很快。"}]}, {"day": 6, "title": "Day 6｜HSK4 基礎強化", "vocab": [{"id": "d6-v0", "zh": "顺利", "pinyin": "shùnlì", "ja": "順調だ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d6-v1", "zh": "安全", "pinyin": "ānquán", "ja": "安全だ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d6-v2", "zh": "准时", "pinyin": "zhǔnshí", "ja": "時間通り", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d6-v3", "zh": "负责", "pinyin": "fùzé", "ja": "担当する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d6-v4", "zh": "同意", "pinyin": "tóngyì", "ja": "同意する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d6-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d6-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d6-g2"}], "test": [{"type": "mc", "q": "「顺利」の意味は？", "options": ["解決する", "影響する", "リマインドする、注意するように言う", "順調だ"], "answer": "順調だ"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["安全", "准时", "负责", "同意"], "answer": "安全"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["一边看手机", "他", "一边吃饭"], "answer": "他一边吃饭，一边看手机。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 7, "title": "Day 7｜HSK4 基礎強化", "vocab": [{"id": "d7-v0", "zh": "拒绝", "pinyin": "jùjué", "ja": "断る", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d7-v1", "zh": "解释", "pinyin": "jiěshì", "ja": "説明する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d7-v2", "zh": "改变", "pinyin": "gǎibiàn", "ja": "変える", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d7-v3", "zh": "推迟", "pinyin": "tuīchí", "ja": "延期する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d7-v4", "zh": "提前", "pinyin": "tíqián", "ja": "前倒しする", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d7-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d7-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d7-g2"}], "test": [{"type": "mc", "q": "「拒绝」の意味は？", "options": ["処理する、対応する", "解決する", "断る", "起こる、発生する"], "answer": "断る"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["解释", "改变", "推迟", "提前"], "answer": "解释"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["我想象的", "简单", "那么", "没有", "这个问题"], "answer": "这个问题没有我想象的那么简单。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 8, "title": "Day 8｜HSK4 基礎強化", "vocab": [{"id": "d8-v0", "zh": "检查", "pinyin": "jiǎnchá", "ja": "チェックする", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d8-v1", "zh": "整理", "pinyin": "zhěnglǐ", "ja": "整理する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d8-v2", "zh": "准备", "pinyin": "zhǔnbèi", "ja": "準備する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d8-v3", "zh": "计划", "pinyin": "jìhuà", "ja": "計画する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d8-v4", "zh": "选择", "pinyin": "xuǎnzé", "ja": "選ぶ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d8-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d8-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d8-g2"}], "test": [{"type": "mc", "q": "「检查」の意味は？", "options": ["チェックする", "結果、その結果", "急いで、早く", "処理する、対応する"], "answer": "チェックする"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["整理", "准备", "计划", "选择"], "answer": "整理"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["资料", "请", "把", "发给", "我"], "answer": "请把资料发给我。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 9, "title": "Day 9｜HSK4 基礎強化", "vocab": [{"id": "d9-v0", "zh": "比较", "pinyin": "bǐjiào", "ja": "比較的、比べる", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d9-v1", "zh": "决定", "pinyin": "juédìng", "ja": "決める", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d9-v2", "zh": "尝试", "pinyin": "chángshì", "ja": "試す", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d9-v3", "zh": "坚持", "pinyin": "jiānchí", "ja": "続ける、堅持する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d9-v4", "zh": "放弃", "pinyin": "fàngqì", "ja": "諦める", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送ってください。", "test": "住所を私に送ってください。", "answer": "请把地址发给我。", "id": "d9-g0"}, {"name": "動詞 + 得 + 程度", "pinyin": "dòngcí + de + chéngdù", "meaning": "どの程度〜するか", "explain": "動詞の後に得を置き、その後ろで程度を説明します。話すのが自然、走るのが速い、作るのが上手い、などに使います。", "contrast": "我说中文＝中国語を話す。 我中文说得很好＝中国語を話すのが上手い。", "mistake": "我讲中文自然 より 我中文说得很自然 が自然です。", "example": "我中文说得还不太自然。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d9-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d9-g2"}], "test": [{"type": "mc", "q": "「比较」の意味は？", "options": ["比較的、比べる", "急いで、早く", "議論する、相談する", "ほとんど"], "answer": "比較的、比べる"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["决定", "尝试", "坚持", "放弃"], "answer": "决定"}, {"type": "mc", "q": "文法「把構文」の説明として正しいものは？", "options": ["目的語をどう処理したか", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "目的語をどう処理したか"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["说得", "还不太", "自然", "我", "中文"], "answer": "我中文说得还不太自然。"}, {"type": "writing", "q": "彼は話すのがとても速いです。", "answer": "他说得很快。"}]}, {"day": 10, "title": "Day 10｜HSK4 基礎強化", "vocab": [{"id": "d10-v0", "zh": "注意", "pinyin": "zhùyì", "ja": "注意する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d10-v1", "zh": "根据", "pinyin": "gēnjù", "ja": "〜に基づいて", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d10-v2", "zh": "要求", "pinyin": "yāoqiú", "ja": "要求する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d10-v3", "zh": "经验", "pinyin": "jīngyàn", "ja": "経験", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d10-v4", "zh": "机会", "pinyin": "jīhuì", "ja": "機会", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d10-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d10-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d10-g2"}], "test": [{"type": "mc", "q": "「注意」の意味は？", "options": ["面倒だ", "手続き", "ほとんど", "注意する"], "answer": "注意する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["根据", "要求", "经验", "机会"], "answer": "根据"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["我", "因为", "所以", "没有时间", "没吃午饭"], "answer": "因为没有时间，所以我没吃午饭。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 11, "title": "Day 11｜HSK4 基礎強化", "vocab": [{"id": "d11-v0", "zh": "环境", "pinyin": "huánjìng", "ja": "環境", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d11-v1", "zh": "条件", "pinyin": "tiáojiàn", "ja": "条件", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d11-v2", "zh": "感觉", "pinyin": "gǎnjué", "ja": "感じる", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d11-v3", "zh": "兴趣", "pinyin": "xìngqù", "ja": "興味", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d11-v4", "zh": "目的", "pinyin": "mùdì", "ja": "目的", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d11-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d11-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d11-g2"}], "test": [{"type": "mc", "q": "「环境」の意味は？", "options": ["環境", "面倒だ", "流暢だ", "自然だ"], "answer": "環境"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["条件", "感觉", "兴趣", "目的"], "answer": "条件"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["我", "很忙", "虽然", "想继续学习", "但是"], "answer": "虽然很忙，但是我想继续学习。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 12, "title": "Day 12｜HSK4 基礎強化", "vocab": [{"id": "d12-v0", "zh": "关系", "pinyin": "guānxì", "ja": "関係", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d12-v1", "zh": "内容", "pinyin": "nèiróng", "ja": "内容", "example": に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d14-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d14-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d14-g2"}], "test": [{"type": "mc", "q": "「服务」の意味は？", "options": ["担当する", "断る", "同意する", "サービス"], "answer": "サービス"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["价格", "味道", "辣椒", "调整"], "answer": "价格"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["一边吃饭", "他", "一边看手机"], "answer": "他一边吃饭，一边看手机。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 15, "title": "Day 15｜HSK4 基礎強化", "vocab": [{"id": "d15-v0", "zh": "客户", "pinyin": "kèhù", "ja": "顧客", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d15-v1", "zh": "经理", "pinyin": "jīnglǐ", "ja": "マネージャー", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d15-v2", "zh": "同事", "pinyin": "tóngshì", "ja": "同僚", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d15-v3", "zh": "会议室", "pinyin": "huìyìshì", "ja": "会議室", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d15-v4", "zh": "资料", "pinyin": "zīliào", "ja": "資料", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d15-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d15-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d15-g2"}], "test": [{"type": "mc", "q": "「客户」の意味は？", "options": ["変える", "説明する", "顧客", "断る"], "answer": "顧客"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["经理", "同事", "会议室", "资料"], "answer": "经理"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["简单", "那么", "没有", "我想象的", "这个问题"], "answer": "这个问题没有我想象的那么简单。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 16, "title": "Day 16｜HSK4 基礎強化", "vocab": [{"id": "d16-v0", "zh": "报告", "pinyin": "bàogào", "ja": "報告書", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d16-v1", "zh": "合同", "pinyin": "hétong", "ja": "契約書", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d16-v2", "zh": "护照", "pinyin": "hùzhào", "ja": "パスポート", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d16-v3", "zh": "身份证", "pinyin": "shēnfènzhèng", "ja": "身分証", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d16-v4", "zh": "地址", "pinyin": "dìzhǐ", "ja": "住所", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d16-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d16-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d16-g2"}], "test": [{"type": "mc", "q": "「报告」の意味は？", "options": ["報告書", "前倒しする", "変える", "延期する"], "answer": "報告書"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["合同", "护照", "身份证", "地址"], "answer": "合同"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["请", "把", "我", "发给", "资料"], "answer": "请把资料发给我。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 17, "title": "Day 17｜HSK4 基礎強化", "vocab": [{"id": "d17-v0", "zh": "定位", "pinyin": "dìngwèi", "ja": "位置情報", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d17-v1", "zh": "二维码", "pinyin": "èrwéimǎ", "ja": "QRコード", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d17-v2", "zh": "外卖", "pinyin": "wàimài", "ja": "デリバリー", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d17-v3", "zh": "地铁", "pinyin": "dìtiě", "ja": "地下鉄", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d17-v4", "zh": "高铁", "pinyin": "gāotiě", "ja": "高速鉄道", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送ってください。", "test": "住所を私に送ってください。", "answer": "请把地址发给我。", "id": "d17-g0"}, {"name": "動詞 + 得 + 程度", "pinyin": "dòngcí + de + chéngdù", "meaning": "どの程度〜するか", "explain": "動詞の後に得を置き、その後ろで程度を説明します。話すのが自然、走るのが速い、作るのが上手い、などに使います。", "contrast": "我说中文＝中国語を話す。 我中文说得很好＝中国語を話すのが上手い。", "mistake": "我讲中文自然 より 我中文说得很自然 が自然です。", "example": "我中文说得还不太自然。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d17-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d17-g2"}], "test": [{"type": "mc", "q": "「定位」の意味は？", "options": ["位置情報", "チェックする", "前倒しする", "整理する"], "answer": "位置情報"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["二维码", "外卖", "地铁", "高铁"], "answer": "二维码"}, {"type": "mc", "q": "文法「把構文」の説明として正しいものは？", "options": ["目的語をどう処理したか", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "目的語をどう処理したか"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["中文", "说得", "我", "自然", "还不太"], "answer": "我中文说得还不太自然。"}, {"type": "writing", "q": "彼は話すのがとても速いです。", "answer": "他说得很快。"}]}, {"day": 18, "title": "Day 18｜HSK4 基礎強化", "vocab": [{"id": "d18-v0", "zh": "打车", "pinyin": "dǎchē", "ja": "タクシーに乗る/呼ぶ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d18-v1", "zh": "堵车", "pinyin": "dǔchē", "ja": "渋滞する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d18-v2", "zh": "迟到", "pinyin": "chídào", "ja": "遅刻する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d18-v3", "zh": "加班", "pinyin": "jiābān", "ja": "残業する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d18-v4", "zh": "出差", "pinyin": "chūchāi", "ja": "出張する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d18-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d18-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d18-g2"}], "test": [{"type": "mc", "q": "「打车」の意味は？", "options": ["準備する", "計画する", "タクシーに乗る/呼ぶ", "整理する"], "answer": " ないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d19-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d19-g2"}], "test": [{"type": "mc", "q": "「报名」の意味は？", "options": ["計画する", "比較的、比べる", "選ぶ", "申し込む"], "answer": "申し込む"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["考试", "复习", "预习", "发音"], "answer": "考试"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["很忙", "我", "想继续学习", "但是", "虽然"], "answer": "虽然很忙，但是我想继续学习。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 20, "title": "Day 20｜HSK4 基礎強化", "vocab": [{"id": "d20-v0", "zh": "语法", "pinyin": "yǔfǎ", "ja": "文法", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d20-v1", "zh": "句子", "pinyin": "jùzi", "ja": "文", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d20-v2", "zh": "词语", "pinyin": "cíyǔ", "ja": "語句", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d20-v3", "zh": "听力", "pinyin": "tīnglì", "ja": "リスニング", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d20-v4", "zh": "阅读", "pinyin": "yuèdú", "ja": "読解", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d20-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d20-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d20-g2"}], "test": [{"type": "mc", "q": "「语法」の意味は？", "options": ["決める", "文法", "試す", "比較的、比べる"], "answer": "文法"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["句子", "词语", "听力", "阅读"], "answer": "句子"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["苏州", "去过", "两次", "我"], "answer": "我去过苏州两次。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 21, "title": "Day 21｜HSK4 基礎強化", "vocab": [{"id": "d21-v0", "zh": "书写", "pinyin": "shūxiě", "ja": "書写", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d21-v1", "zh": "翻译", "pinyin": "fānyì", "ja": "翻訳する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d21-v2", "zh": "意思", "pinyin": "yìsi", "ja": "意味", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d21-v3", "zh": "想象", "pinyin": "xiǎngxiàng", "ja": "想像する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d21-v4", "zh": "犹豫", "pinyin": "yóuyù", "ja": "ためらう", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送ってください。", "test": "住所を私に送ってください。", "answer": "请把地址发给我。", "id": "d21-g0"}, {"name": "動詞 + 得 + 程度", "pinyin": "dòngcí + de + chéngdù", "meaning": "どの程度〜するか", "explain": "動詞の後に得を置き、その後ろで程度を説明します。話すのが自然、走るのが速い、作るのが上手い、などに使います。", "contrast": "我说中文＝中国語を話す。 我中文说得很好＝中国語を話すのが上手い。", "mistake": "我讲中文自然 より 我中文说得很自然 が自然です。", "example": "我中文说得还不太自然。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d21-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d21-g2"}], "test": [{"type": "mc", "q": "「书写」の意味は？", "options": ["書写", "続ける、堅持する", "諦める", "試す"], "answer": "書写"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想___ uì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d22-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d22-g2"}], "test": [{"type": "mc", "q": "「主动」の意味は？", "options": ["〜に基づいて", "注意する", "主体的に", "諦める"], "answer": "主体的に"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["依赖", "明显", "正式", "临时"], "answer": "依赖"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["一边看手机", "一边吃饭", "他"], "answer": "他一边吃饭，一边看手机。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 23, "title": "Day 23｜HSK4 基礎強化", "vocab": [{"id": "d23-v0", "zh": "突然", "pinyin": "tūrán", "ja": "突然", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d23-v1", "zh": "原来", "pinyin": "yuánlái", "ja": "もともと、なんだ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d23-v2", "zh": "后来", "pinyin": "hòulái", "ja": "その後", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d23-v3", "zh": "首先", "pinyin": "shǒuxiān", "ja": "まず", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d23-v4", "zh": "最后", "pinyin": "zuìhòu", "ja": "最後に", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d23-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d23-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d23-g2"}], "test": [{"type": "mc", "q": "「突然」の意味は？", "options": ["〜に基づいて", "経験", "突然", "要求する"], "answer": "突然"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["原来", "后来", "首先", "最后"], "answer": "原来"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["我想象的", "这个问题", "没有", "简单", "那么"], "answer": "这个问题没有我想象的那么简单。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 24, "title": "Day 24｜HSK4 基礎強化", "vocab": [{"id": "d24-v0", "zh": "另外", "pinyin": "lìngwài", "ja": "さらに", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d24-v1", "zh": "而且", "pinyin": "érqiě", "ja": "しかも", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d24-v2", "zh": "不过", "pinyin": "búguò", "ja": "ただし", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d24-v3", "zh": "尤其", "pinyin": "yóuqí", "ja": "特に", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d24-v4", "zh": "甚至", "pinyin": "shènzhì", "ja": "〜さえ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d24-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d24-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d24-g2"}], "test": [{"type": "mc", "q": "「另外」の意味は？", "options": ["経験", "さらに", "機会", "環境"], "answer": "さらに"}, {"type": "mc", 。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d25-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d25-g2"}], "test": [{"type": "mc", "q": "「由于」の意味は？", "options": ["環境", "条件", "〜のため", "感じる"], "answer": "〜のため"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["因此", "否则", "只要", "无论"], "answer": "因此"}, {"type": "mc", "q": "文法「把構文」の説明として正しいものは？", "options": ["目的語をどう処理したか", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "目的語をどう処理したか"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["自然", "说得", "还不太", "我", "中文"], "answer": "我中文说得还不太自然。"}, {"type": "writing", "q": "彼は話すのがとても速いです。", "answer": "他说得很快。"}]}, {"day": 26, "title": "Day 26｜HSK4 基礎強化", "vocab": [{"id": "d26-v0", "zh": "附近", "pinyin": "fùjìn", "ja": "近く", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d26-v1", "zh": "周围", "pinyin": "zhōuwéi", "ja": "周辺", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d26-v2", "zh": "距离", "pinyin": "jùlí", "ja": "距離", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d26-v3", "zh": "入口", "pinyin": "rùkǒu", "ja": "入口", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d26-v4", "zh": "出口", "pinyin": "chūkǒu", "ja": "出口", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d26-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d26-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d26-g2"}], "test": [{"type": "mc", "q": "「附近」の意味は？", "options": ["目的", "近く", "興味", "感じる"], "answer": "近く"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["周围", "距离", "入口", "出口"], "answer": "周围"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["没吃午饭", "所以", "没有时间", "我", "因为"], "answer": "因为没有时间，所以我没吃午饭。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 27, "title": "Day 27｜HSK4 基礎強化", "vocab": [{"id": "d27-v0", "zh": "楼下", "pinyin": "lóuxià", "ja": "階下", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d27-v1", "zh": "楼上", "pinyin": "lóushàng", "ja": "階上", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d27-v2", "zh": "对面", "pinyin": "duìmiàn", "ja": "向かい", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d27-v3", "zh": "旁边", "pinyin": "pángbiān", "ja": "隣", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d27-v4", "zh": "里面", "pinyin": "lǐmiàn", "ja": "中", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d27-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d27-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d27-g2"}], "test": [{"type": "mc", "q": "「楼下」の意味は？", "options": ["階下", "目的", "関係", "内容"], "answer": "階下"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["楼上", "对面", "旁边", "里面"], "answer": "楼上"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["但是", "很忙", "我", "想继续学习", "虽然"], "answer": "虽然很忙，但是我想继续学习。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 28, "title": "Day 28｜HSK4 基礎強化", "vocab": [{"id": "d28-v0", "zh": "外面", "pinyin": "wàimiàn", "ja": "外", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d28-v1", "zh": "声音", "pinyin": "shēngyīn", "ja": "音、声", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d28-v2", "zh": "消息", "pinyin": "xiāoxi", "ja": "知らせ、メッセージ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d28-v3", "zh": "邮件", "pinyin": "yóujiàn", "ja": "メール", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d28-v4", "zh": "电话", "pinyin": "diànhuà", "ja": "電話", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d28-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d28-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d28-g2"}], "test": [{"type": "mc", "q": "「外面」の意味は？", "options": ["内容", "違い", "重点", "外"], "answer": "外"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["声音", "消息", "邮件", "电话"], "answer": "声音"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["两次", "去过", "我", "苏州"], "answer": "我去过苏州两次。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 29, "title": "Day 29｜HSK4 基礎強化", "vocab": [{"id": "d29-v0", "zh": "微信", "pinyin": "Wēixìn", "ja": "WeChat", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d29-v1", "zh": "手机", "pinyin": "shǒujī", "ja": "スマホ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d29-v2", "zh": "电脑", "pinyin": "diànnǎo", "ja": "パソコン", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d29-v3", "zh": "表格", "pinyin": "biǎogé", "ja": "表", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d29-v4", "zh": "文件", "pinyin": "wénjiàn", "ja": "ファイル", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送ってください。", "test": "住所を私に送ってください。", "answer": "请把地址发给我。", "id": "d29-g0"}, {"name": "動詞 + 得 + 程度", "pinyin": "dòngcí + de + chéngdù", "meaning": "どの程度〜するか", "explain": "動詞の後に得を置き、その後ろで程度を説明します。話すのが自然、走るのが速い、作るのが上手い、などに使います。", "contrast": "我说中文＝中国語を話す。 我中文说得很好＝中国語を話すのが上手い。", "mistake": "我讲中文自然 より 我中文说得很自然 が自然です。", "example": "我中文说得还不太自然。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d29-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d29-g2"}], "test": [{"type": "mc", "q": "「微信」の意味は？", "options": ["方法", "原因", "違い", "WeChat"], "answer": "WeChat"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["手机", "电脑", "表格", "文件"], "answer": "手机"}, {"type": "mc", "q": "文法「把構文」の説明として正しいものは？", "options": ["目的語をどう処理したか", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "目的語をどう処理したか"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["开着", "门"], "answer": "门开着。"}, {"type": "writing", "q": "彼は話すのがとても速いです。", "answer": "他说得很快。"}]}, {"day": 30, "title": "Day 30｜HSK4 基礎強化", "vocab": [{"id": "d30-v0", "zh": "礼貌", "pinyin": "lǐmào", "ja": "礼儀正しい", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d30-v1", "zh":
