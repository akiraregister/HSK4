est": [{"type": "mc", "q": "「礼貌」の意味は？", "options": ["方法", "礼儀正しい", "速度", "能力"], "answer": "礼儀正しい"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["耐心", "仔细", "认真", "马虎"], "answer": "耐心"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["一边看手机", "一边吃饭", "他"], "answer": "他一边吃饭，一边看手机。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 31, "title": "Day 31｜HSK4 基礎強化", "vocab": [{"id": "d31-v0", "zh": "清楚", "pinyin": "qīngchu", "ja": "はっきりしている", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d31-v1", "zh": "简单", "pinyin": "jiǎndān", "ja": "簡単", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d31-v2", "zh": "困难", "pinyin": "kùnnan", "ja": "難しい", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d31-v3", "zh": "重要", "pinyin": "zhòngyào", "ja": "重要", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d31-v4", "zh": "主要", "pinyin": "zhǔyào", "ja": "主要な", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d31-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d31-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d31-g2"}], "test": [{"type": "mc", "q": "「清楚」の意味は？", "options": ["質", "態度", "速度", "はっきりしている"], "answer": "はっきりしている"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["简单", "困难", "重要", "主要"], "answer": "简单"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["我想象的", "没有", "那么", "这个问题", "简单"], "answer": "这个问题没有我想象的那么简单。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 32, "title": "Day 32｜HSK4 基礎強化", "vocab": [{"id": "d32-v0", "zh": "一般", "pinyin": "yìbān", "ja": "普通、一般的", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d32-v1", "zh": "特别", "pinyin": "tèbié", "ja": "特別に、とても", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d32-v2", "zh": "实际", "pinyin": "shíjì", "ja": "実際", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d32-v3", "zh": "正确", "pinyin": "zhèngquè", "ja": "正しい", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d32-v4", "zh": "错误", "pinyin": "cuòwù", "ja": "間違い", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d32-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d32-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d32-g2"}], "test": [{"type": "mc", "q": "「一般」の意味は？", "options": ["態度", "サービス", "価格", "普通、一般的"], "answer": "普通、一般的"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["特别", "实际", "正确", "错误"], "answer": "特别"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["资料", "把", "请", "我", "发给"], "answer": "请把资料发给我。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 33, "title": "Day 33｜HSK4 基礎強化", "vocab": [{"id": "d33-v0", "zh": "满意", "pinyin": "mǎnyì", "ja": "満足する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d33-v1", "zh": "担心", "pinyin": "dānxīn", "ja": "心配する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d33-v2", "zh": "放心", "pinyin": "fàngxīn", "ja": "安心する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d33-v3", "zh": "生气", "pinyin": "shēngqì", "ja": "怒る", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d33-v4", "zh": "紧张", "pinyin": "jǐnzhāng", "ja": "緊張する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送ってください。", "test": "住所を私に送ってください。", "answer": "请把地址发给我。", "id": "d33-g0"}, {"name": "動詞 + 得 + 程度", "pinyin": "dòngcí + de + chéngdù", "meaning": "どの程度〜するか", "explain": "動詞の後に得を置き、その後ろで程度を説明します。話すのが自然、走るのが速い、作るのが上手い、などに使います。", "contrast": "我说中文＝中国語を話す。 我中文说得很好＝中国語を話すのが上手い。", "mistake": "我讲中文自然 より 我中文说得很自然 が自然です。", "example": "我中文说得还不太自然。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d33-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d33-g2"}], "test": [{"type": "mc", "q": "「满意」の意味は？", "options": ["唐辛子", "満足する", "味", "価格"], "answer": "満足する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["担心", "放心", "生气", "紧张"], "answer": "担心"}, {"type": "mc", "q": "文法「把構文」の説明として正しいものは？", "options": ["目的語をどう処理したか", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "目的語をどう処理したか"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["还不太", "我", "自然", "说得", "中文"], "answer": "我中文说得还不太自然。"}, {"type": "writing", "q": "彼は話すのがとても速いです。", "answer": "他说得很快。"}]}, {"day": 34, "title": "Day 34｜HSK4 基礎強化", "vocab": [{"id": "d34-v0", "zh": "舒服", "pinyin": "shūfu", "ja": "快適だ", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d34-v1", "zh": "健康", "pinyin": "jiànkāng", "ja": "健康", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d34-v2", "zh": "发烧", "pinyin": "fāshāo", "ja": "熱が出る", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d34-v3", "zh": "休息", "pinyin": "xiūxi", "ja": "休む", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d34-v4", "zh": "运动", "pinyin": "yùndòng", "ja": "運動する", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d34-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d34-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d34-g2"}], "test": [{"type": "mc", "q": "「舒服」の意味は？", "options": ["唐辛子", "快適だ", "顧客", "調整する"], "answer": "快適だ"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["健康", "发烧", "休息", "运动"], "answer": "健康"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["没有时间", "所以", "我", "没吃午饭", "因为"], "answer": "因为没有时间，所以我没吃午饭。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 35, "title": "Day 35｜HSK4 基礎強化", "vocab": [{"id": "d35-v0", "zh": "天气", "pinyin": "tiānqì", "ja": "天気", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d35-v1", "zh": "下雨", "pinyin": "xiàyǔ", "ja": "雨が降る", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d35-v2", "zh": "变冷", "pinyin": "biàn lěng", "ja": "寒くなる", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d35-v3", "zh": "变热", "pinyin": "biàn rè", "ja": "暑くなる", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d35-v4", "zh": "季节", "pinyin": "jìjié", "ja": "季節", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d35-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d35-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d35-g2"}], "test": [{"type": "mc", "q": "「天气」の意味は？", "options": ["同僚", "顧客", "天気", "マネージャー"], "answer": "天気"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我想____。", "options": ["下雨", "变冷", "变热", "季节"], "answer": "下雨"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["但是", "虽然", "想继续学习", "很忙", "我"], "answer": "虽然很忙，但是我想继续学习。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 36, "title": "Day 36｜HSK4 基礎強化", "vocab": [{"id": "d36-v0", "zh": "城市", "pinyin": "chéngshì", "ja": "都市", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d36-v1", "zh": "生活", "pinyin": "shēnghuó", "ja": "生活", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d36-v2", "zh": "工作", "pinyin": "gōngzuò", "ja": "仕事", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d36-v3", "zh": "家庭", "pinyin": "jiātíng", "ja": "家庭", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}, {"id": "d36-v4", "zh": "孩子", "pinyin": "háizi", "ja": "子ども", "example": "这个词在生活中很常用。", "exPinyin": "Zhège cí zài shēnghuó zhōng hěn chángyòng.", "exJa": "この単語は生活でよく使われます。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d36-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d36-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d36-g2"}], "test": [{"type": "mc", "q": "「城市」の意味は？", "options": ["同僚", "資料", "都市", "会議室"], "answer": "都市"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n这个词在____中很常用。", "options": ["生活", "工作", "家庭", "孩子"], "answer": "生活"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["去过", "我", "苏州", "两次"], "answer": "我去过苏州两次。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 37, "title": "Day 37｜HSK4 基礎強化", "vocab": [{"id": "d37-v0", "zh": "提高语法", "pinyin": "tígāo yǔfǎ", "ja": "文法を高める", "example": "我每天提高语法。", "exPinyin": "Wǒ měitiān tígāo yǔfǎ.", "exJa": "私は毎日文法を高める。"}, {"id": "d37-v1", "zh": "提高发音", "pinyin": "tígāo fāyīn", "ja": "発音を高める", "example": "我每天提高发音。", "exPinyin": "Wǒ měitiān tígāo fāyīn.", "exJa": "私は毎日発音を高める。"}, {"id": "d37-v2", "zh": "提高听力", "pinyin": "tígāo tīnglì", "ja": "リスニングを高める", "example": "我每天提高听力。", "exPinyin": "Wǒ měitiān tígāo tīnglì.", "exJa": "私は毎日リスニングを高める。"}, {"id": "d37-v3", "zh": "提高阅读", "pinyin": "tígāo yuèdú", "ja": "読解を高める", "example": "我每天提高阅读。", "exPinyin": "Wǒ měitiān tígāo yuèdú.", "exJa": "私は毎日読解を高める。"}, {"id": "d37-v4", "zh": "提高表达", "pinyin": "tígāo biǎodá", "ja": "表現を高める", "example": "我每天提高表达。", "exPinyin": "Wǒ měitiān tígāo biǎodá.", "exJa": "私は毎日表現を高める。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送ってください。", "test": "住所を私に送ってください。", "answer": "请把地址发给我。", "id": "d37-g0"}, {"name": "動詞 + 得 + 程度", "pinyin": "dòngcí + de + chéngdù", "meaning": "どの程度〜するか", "explain": "動詞の後に得を置き、その後ろで程度を説明します。話すのが自然、走るのが速い、作るのが上手い、などに使います。", "contrast": "我说中文＝中国語を話す。 我中文说得很好＝中国語を話すのが上手い。", "mistake": "我讲中文自然 より 我中文说得很自然 が自然です。", "example": "我中文说得还不太自然。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d37-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d37-g2"}], "test": [{"type": "mc", "q": "「提高语法」の意味は？", "options": ["資料", "契約書", "報告書", "文法を高める"], "answer": "文法を高める"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["提高发音", "提高听力", "提高阅读", "提高表达"], "answer": "提高发音"}, {"type": "mc", "q": "文法「把構文」の説明として正しいものは？", "options": ["目的語をどう処理したか", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "目的語をどう処理したか"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["开着", "门"], "answer": "门开着。"}, {"type": "writing", "q": "彼は話すのがとても速いです。", "answer": "他说得很快。"}]}, {"day": 38, "title": "Day 38｜HSK4 基礎強化", "vocab": [{"id": "d38-v0", "zh": "提高资料", "pinyin": "tígāo zīliào", "ja": "資料を高める", "example": "我每天提高资料。", "exPinyin": "Wǒ měitiān tígāo zīliào.", "exJa": "私は毎日資料を高める。"}, {"id": "d38-v1", "zh": "提高句子", "pinyin": "tígāo jùzi", "ja": "文を高める", "example": "我每天提高句子。", "exPinyin": "Wǒ měitiān tígāo jùzi.", "exJa": "私は毎日文を高める。"}, {"id": "d38-v2", "zh": "提高重点", "pinyin": "tígāo zhòngdiǎn", "ja": "重点を高める", "example": "我每天提高重点。", "exPinyin": "Wǒ měitiān tígāo zhòngdiǎn.", "exJa": "私は毎日重点を高める。"}, {"id": "d38-v3", "zh": "提高错误", "pinyin": "tígāo cuòwù", "ja": "間違いを高める", "example": "我每天提高错误。", "exPinyin": "Wǒ měitiān tígāo cuòwù.", "exJa": "私は毎日間違いを高める。"}, {"id": "d38-v4", "zh": "提高内容", "pinyin": "tígāo nèiróng", "ja": "内容を高める", "example": "我每天提高内容。", "exPinyin": "Wǒ měitiān tígāo nèiróng.", "exJa": "私は毎日内容を高める。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d38-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d38-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d38-g2"}], "test": [{"type": "mc", "q": "「提高资料」の意味は？", "options": ["パスポート", "資料を高める", "契約書", "身分証"], "answer": "資料を高める"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["提高句子", "提高重点", "提高错误", "提高内容"], "answer": "提高句子"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["一边吃饭", "一边看手机", "他"], "answer": "他一边吃饭，一边看手机。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 39, "title": "Day 39｜HSK4 基礎強化", "vocab": [{"id": "d39-v0", "zh": "提高答案", "pinyin": "tígāo dá'àn", "ja": "答えを高める", "example": "我每天提高答案。", "exPinyin": "Wǒ měitiān tígāo dá'àn.", "exJa": "私は毎日答えを高める。"}, {"id": "d39-v1", "zh": "提高问题", "pinyin": "tígāo wèntí", "ja": "問題を高める", "example": "我每天提高问题。", "exPinyin": "Wǒ měitiān tígāo wèntí.", "exJa": "私は毎日問題を高める。"}, {"id": "d39-v2", "zh": "复习语法", "pinyin": "fùxí yǔfǎ", "ja": "文法を復習する", "example": "我每天复习语法。", "exPinyin": "Wǒ měitiān fùxí yǔfǎ.", "exJa": "私は毎日文法を復習する。"}, {"id": "d39-v3", "zh": "复习发音", "pinyin": "fùxí fāyīn", "ja": "発音を復習する", "example": "我每天复习发音。", "exPinyin": "Wǒ měitiān fùxí fāyīn.", "exJa": "私は毎日発音を復習する。"}, {"id": "d39-v4", "zh": "复习听力", "pinyin": "fùxí tīnglì", "ja": "リスニングを復習する", "example": "我每天复习听力。", "exPinyin": "Wǒ měitiān fùxí tīnglì.", "exJa": "私は毎日リスニングを復習する。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d39-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d39-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d39-g2"}], "test": [{"type": "mc", "q": "「提高答案」の意味は？", "options": ["答えを高める", "住所", "位置情報", "身分証"], "answer": "答えを高める"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["提高问题", "复习语法", "复习发音", "复习听力"], "answer": "提高问题"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["那么", "这个问题", "我想象的", "简单", "没有"], "answer": "这个问题没有我想象的那么简单。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 40, "title": "Day 40｜HSK4 基礎強化", "vocab": [{"id": "d40-v0", "zh": "复习阅读", "pinyin": "fùxí yuèdú", "ja": "読解を復習する", "example": "我每天复习阅读。", "exPinyin": "Wǒ měitiān fùxí yuèdú.", "exJa": "私は毎日読解を復習する。"}, {"id": "d40-v1", "zh": "复习表达", "pinyin": "fùxí biǎodá", "ja": "表現を復習する", "example": "我每天复习表达。", "exPinyin": "Wǒ měitiān fùxí biǎodá.", "exJa": "私は毎日表現を復習する。"}, {"id": "d40-v2", "zh": "复习资料", "pinyin": "fùxí zīliào", "ja": "資料を復習する", "example": "我每天复习资料。", "exPinyin": "Wǒ měitiān fùxí zīliào.", "exJa": "私は毎日資料を復習する。"}, {"id": "d40-v3", "zh": "复习句子", "pinyin": "fùxí jùzi", "ja": "文を復習する", "example": "我每天复习句子。", "exPinyin": "Wǒ měitiān fùxí jùzi.", "exJa": "私は毎日文を復習する。"}, {"id": "d40-v4", "zh": "复习重点", "pinyin": "fùxí zhòngdiǎn", "ja": "重点を復習する", "example": "我每天复习重点。", "exPinyin": "Wǒ měitiān fùxí zhòngdiǎn.", "exJa": "私は毎日重点を復習する。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d40-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d40-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d40-g2"}], "test": [{"type": "mc", "q": "「复习阅读」の意味は？", "options": ["位置情報", "読解を復習する", "QRコード", "デリバリー"], "answer": "読解を復習する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["复习表达", "复习资料", "复习句子", "复习重点"], "answer": "复习表达"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["发给", "请", "我", "把", "资料"], "answer": "请把资料发给我。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 41, "title": "Day 41｜HSK4 基礎強化", "vocab": [{"id": "d41-v0", "zh": "复习错误", "pinyin": "fùxí cuòwù", "ja": "間違いを復習する", "example": "我每天复习错误。", "exPinyin": "Wǒ měitiān fùxí cuòwù.", "exJa": "私は毎日間違いを復習する。"}, {"id": "d41-v1", "zh": "复习内容", "pinyin": "fùxí nèiróng", "ja": "内容を復習する", "example": "我每天复习内容。", "exPinyin": "Wǒ měitiān fùxí nèiróng.", "exJa": "私は毎日内容を復習する。"}, {"id": "d41-v2", "zh": "复习答案", "pinyin": "fùxí dá'àn", "ja": "答えを復習する", "example": "我每天复习答案。", "exPinyin": "Wǒ měitiān fùxí dá'àn.", "exJa": "私は毎日答えを復習する。"}, {"id": "d41-v3", "zh": "复习问题", "pinyin": "fùxí wèntí", "ja": "問題を復習する", "example": "我每天复习问题。", "exPinyin": "Wǒ měitiān fùxí wèntí.", "exJa": "私は毎日問題を復習する。"}, {"id": "d41-v4", "zh": "练习语法", "pinyin": "liànxí yǔfǎ", "ja": "文法を練習する", "example": "我每天练习语法。", "exPinyin": "Wǒ měitiān liànxí yǔfǎ.", "exJa": "私は毎日文法を練習する。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": d42-v2", "zh": "练习阅读", "pinyin": "liànxí yuèdú", "ja": "読解を練習する", "example": "我每天练习阅读。", "exPinyin": "Wǒ měitiān liànxí yuèdú.", "exJa": "私は毎日読解を練習する。"}, {"id": "d42-v3", "zh": "练习表达", "pinyin": "liànxí biǎodá", "ja": "表現を練習する", "example": "我每天练习表达。", "exPinyin": "Wǒ měitiān liànxí biǎodá.", "exJa": "私は毎日表現を練習する。"}, {"id": "d42-v4", "zh": "练习资料", "pinyin": "liànxí zīliào", "ja": "資料を練習する", "example": "我每天练习资料。", "exPinyin": "Wǒ měitiān liànxí zīliào.", "exJa": "私は毎日資料を練習する。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d42-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d42-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d42-g2"}], "test": [{"type": "mc", "q": "「练习发音」の意味は？", "options": ["タクシーに乗る/呼ぶ", "高速鉄道", "渋滞する", "発音を練習する"], "answer": "発音を練習する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["练习听力", "练习阅读", "练习表达", "练习资料"], "answer": "练习听力"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["所以", "因为", "我", "没吃午饭", "没有时间"], "answer": "因为没有时间，所以我没吃午饭。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 43, "title": "Day 43｜HSK4 基礎強化", "vocab": [{"id": "d43-v0", "zh": "练习句子", "pinyin": "liànxí jùzi", "ja": "文を練習する", "example": "我每天练习句子。", "exPinyin": "Wǒ měitiān liànxí jùzi.", "exJa": "私は毎日文を練習する。"}, {"id": "d43-v1", "zh": "练习重点", "pinyin": "liànxí zhòngdiǎn", "ja": "重点を練習する", "example": "我每天练习重点。", "exPinyin": "Wǒ měitiān liànxí zhòngdiǎn.", "exJa": "私は毎日重点を練習する。"}, {"id": "d43-v2", "zh": "练习错误", "pinyin": "liànxí cuòwù", "ja": "間違いを練習する", "example": "我每天练习错误。", "exPinyin": "Wǒ měitiān liànxí cuòwù.", "exJa": "私は毎日間違いを練習する。"}, {"id": "d43-v3", "zh": "练习内容", "pinyin": "liànxí nèiróng", "ja": "内容を練習する", "example": "我每天练习内容。", "exPinyin": "Wǒ měitiān liànxí nèiróng.", "exJa": "私は毎日内容を練習する。"}, {"id": "d43-v4", "zh": "练习答案", "pinyin": "liànxí dá'àn", "ja": "答えを練習する", "example": "我每天练习答案。", "exPinyin": "Wǒ měitiān liànxí dá'àn.", "exJa": "私は毎日答えを練習する。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d43-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d43-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d43-g2"}], "test": [{"type": "mc", "q": "「练习句子」の意味は？", "options": ["遅刻する", "残業する", "渋滞する", "文を練習する"], "answer": "文を練習する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["练习重点", "练习错误", "练习内容", "练习答案"], "answer": "练习重点"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["虽然", "我", "很忙", "但是", "想继续学习"], "answer": "虽然很忙，但是我想继续学习。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 44, "title": "Day 44｜HSK4 基礎強化", "vocab": [{"id": "d44-v0", "zh": "练习问题", "pinyin": "liànxí wèntí", "ja": "問題を練習する", "example": "我每天练习问题。", "exPinyin": "Wǒ měitiān liànxí wèntí.", "exJa": "私は毎日問題を練習する。"}, {"id": "d44-v1", "zh": "整理语法", "pinyin": "zhěnglǐ yǔfǎ", "ja": "文法を整理する", "example": "我每天整理语法。", "exPinyin": "Wǒ měitiān zhěnglǐ yǔfǎ.", "exJa": "私は毎日文法を整理する。"}, {"id": "d44-v2", "zh": "整理发音", "pinyin": "zhěnglǐ fāyīn", "ja": "発音を整理する", "example": "我每天整理发音。", "exPinyin": "Wǒ měitiān zhěnglǐ fāyīn.", "exJa": "私は毎日発音を整理する。"}, {"id": "d44-v3", "zh": "整理听力", "pinyin": "zhěnglǐ tīnglì", "ja": "リスニングを整理する", "example": "我每天整理听力。", "exPinyin": "Wǒ měitiān zhěnglǐ tīnglì.", "exJa": "私は毎日リスニングを整理する。"}, {"id": "d44-v4", "zh": "整理阅读", "pinyin": "zhěnglǐ yuèdú", "ja": "読解を整理する", "example": "我每天整理阅读。", "exPinyin": "Wǒ měitiān zhěnglǐ yuèdú.", "exJa": "私は毎日読解を整理する。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d44-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d44-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d44-g2"}], "test": [{"type": "mc", "q": "「练习问题」の意味は？", "options": ["残業する", "問題を練習する", "出張する", "申し込む"], "answer": "問題を練習する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["整理语法", "整理发音", "整理听力", "整理阅读"], "answer": "整理语法"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["我", "苏州", "两次", "去过"], "answer": "我去过苏州两次。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 45, "title": "Day 45｜HSK4 基礎強化", "vocab": [{"id": "d45-v0", "zh": "整理表达", "pinyin": "zhěnglǐ biǎodá", "ja": "表現を整理する", "example": "我每天整理表达。", "exPinyin": "Wǒ měitiān zhěnglǐ biǎodá.", "exJa": "私は毎日表現を整理する。"}, {"id": "d45-v1", "zh": "整理资料", "pinyin": "zhěnglǐ zīliào", "ja": "資料を整理する", "example": "我每天整理资料。", "exPinyin": "Wǒ měitiān zhěnglǐ zīliào.", "exJa": "私は毎日資料を整理する。"}, {"id": "d45-v2", "zh": "整理句子", "pinyin": "zhěnglǐ jùzi", "ja": "文を整理する", "example": "我每天整理句子。", "exPinyin": "Wǒ měitiān zhěnglǐ jùzi.", "exJa": "私は毎日文を整理する。"}, {"id": "d45-v3", "zh": "整理重点", "pinyin": "zhěnglǐ zhòngdiǎn", "ja": "重点を整理する", "example": "我每天整理重点。", "exPinyin": "Wǒ měitiān zhěnglǐ zhòngdiǎn.", "exJa": "私は毎日重点を整理する。"}, {"id": "d45-v4", "zh": "整理错误", "pinyin": "zhěnglǐ cuòwù", "ja": "間違いを整理する", "example": "我每天整理错误。", "exPinyin": "Wǒ měitiān zhěnglǐ cuòwù.", "exJa": "私は毎日間違いを整理する。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送ってください。", "test": "住所を私に送ってください。", "answer": "请把地址发给我。", "id": "d45-g0"}, {"name": "動詞 + 得 + 程度", "pinyin": "dòngcí + de + chéngdù", "meaning": "どの程度〜するか", "explain": "動詞の後に得を置き、その後ろで程度を説明します。話すのが自然、走るのが速い、作るのが上手い、などに使います。", "contrast": "我说中文＝中国語を話す。 我中文说得很好＝中国語を話すのが上手い。", "mistake": "我讲中文自然 より 我中文说得很自然 が自然です。", "example": "我中文说得还不太自然。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d45-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d45-g2"}], "test": [{"type": "mc", "q": "「整理表达」の意味は？", "options": ["表現を整理する", "復習する", "申し込む", "試験"], "answer": "表現を整理する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["整理资料", "整理句子", "整理重点", "整理错误"], "answer": "整理资料"}, {"type": "mc", "q": "文法「把構文」の説明として正しいものは？", "options": ["目的語をどう処理したか", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "目的語をどう処理したか"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["开着", "门"], "answer": "门开着。"}, {"type": "writing", "q": "彼は話すのがとても速いです。", "answer": "他说得很快。"}]}, {"day": 46, "title": "Day 46｜HSK4 基礎強化", "vocab": [{"id": "d46-v0", "zh": "整理内容", "pinyin": "zhěnglǐ nèiróng", "ja": "内容を整理する", "example": "我每天整理内容。", "exPinyin": "Wǒ měitiān zhěnglǐ nèiróng.", "exJa": "私は毎日内容を整理する。"}, {"id": "d46-v1", "zh": "整理答案", "pinyin": "zhěnglǐ dá'àn", "ja": "答えを整理する", "example": "我每天整理答案。", "exPinyin": "Wǒ měitiān zhěnglǐ dá'àn.", "exJa": "私は毎日答えを整理する。"}, {"id": "d46-v2", "zh": "整理问题", "pinyin": "zhěnglǐ wèntí", "ja": "問題を整理する", "example": "我每天整理问题。", "exPinyin": "Wǒ měitiān zhěnglǐ wèntí.", "exJa": "私は毎日問題を整理する。"}, {"id": "d46-v3", "zh": "理解语法", "pinyin": "lǐjiě yǔfǎ", "ja": "文法を理解する", "example": "我每天理解语法。", "exPinyin": "Wǒ měitiān lǐjiě yǔfǎ.", "exJa": "私は毎日文法を理解する。"}, {"id": "d46-v4", "zh": "理解发音", "pinyin": "lǐjiě fāyīn", "ja": "発音を理解する", "example": "我每天理解发音。", "exPinyin": "Wǒ měitiān lǐjiě fāyīn.", "exJa": "私は毎日発音を理解する。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d46-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d46-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d46-g2"}], "test": [{"type": "mc", "q": "「整理内容」の意味は？", "options": ["予習する", "発音", "復習する", "内容を整理する"], "answer": "内容を整理する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["整理答案", "整理问题", "理解语法", "理解发音"], "answer": "整理答案"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["他", "一边看手机", "一边吃饭"], "answer": "他一边吃饭，一边看手机。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。"}]}, {"day": 47, "title": "Day 47｜HSK4 基礎強化", "vocab": [{"id": "d47-v0", "zh": "理解听力", "pinyin": "lǐjiě tīnglì", "ja": "リスニングを理解する", "example": "我每天理解听力。", "exPinyin": "Wǒ měitiān lǐjiě tīnglì.", "exJa": "私は毎日リスニングを理解する。"}, {"id": "d47-v1", "zh": "理解阅读", "pinyin": "lǐjiě yuèdú", "ja": "読解を理解する", "example": "我每天理解阅读。", "exPinyin": "Wǒ měitiān lǐjiě yuèdú.", "exJa": "私は毎日読解を理解する。"}, {"id": "d47-v2", "zh": "理解表达", "pinyin": "lǐjiě biǎodá", "ja": "表現を理解する", "example": "我每天理解表达。", "exPinyin": "Wǒ měitiān lǐjiě biǎodá.", "exJa": "私は毎日表現を理解する。"}, {"id": "d47-v3", "zh": "理解资料", "pinyin": "lǐjiě zīliào", "ja": "資料を理解する", "example": "我每天理解资料。", "exPinyin": "Wǒ měitiān lǐjiě zīliào.", "exJa": "私は毎日資料を理解する。"}, {"id": "d47-v4", "zh": "理解句子", "pinyin": "lǐjiě jùzi", "ja": "文を理解する", "example": "我每天理解句子。", "exPinyin": "Wǒ měitiān lǐjiě jùzi.", "exJa": "私は毎日文を理解する。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d47-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d47-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d47-g2"}], "test": [{"type": "mc", "q": "「理解听力」の意味は？", "options": ["文", "発音", "リスニングを理解する", "文法"], "answer": "リスニングを理解する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["理解阅读", "理解表达", "理解资料", "理解句子"], "answer": "理解阅读"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["简单", "那么", "没有", "我想象的", "这个问题"], "answer": "这个问题没有我想象的那么简单。"}, {"type": "writing", "q": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。"}]}, {"day": 48, "title": "Day 48｜HSK4 基礎強化", "vocab": [{"id": "d48-v0", "zh": "理解重点", "pinyin": "lǐjiě zhòngdiǎn", "ja": "重点を理解する", "example": "我每天理解重点。", "exPinyin": "Wǒ měitiān lǐjiě zhòngdiǎn.", "exJa": "私は毎日重点を理解する。"}, {"id": "d48-v1", "zh": "理解错误", "pinyin": "lǐjiě cuòwù", "ja": "間違いを理解する", "example": "我每天理解错误。", "exPinyin": "Wǒ měitiān lǐjiě cuòwù.", "exJa": "私は毎日間違いを理解する。"}, {"id": "d48-v2", "zh": "理解内容", "pinyin": "lǐjiě nèiróng , "pinyin": "jiǎnchá fāyīn", "ja": "発音をチェックする", "example": "我每天检查发音。", "exPinyin": "Wǒ měitiān jiǎnchá fāyīn.", "exJa": "私は毎日発音をチェックする。"}, {"id": "d51-v4", "zh": "检查听力", "pinyin": "jiǎnchá tīnglì", "ja": "リスニングをチェックする", "example": "我每天检查听力。", "exPinyin": "Wǒ měitiān jiǎnchá tīnglì.", "exJa": "私は毎日リスニングをチェックする。"}], "grammar": [{"name": "没有……那么……", "pinyin": "méiyǒu…nàme…", "meaning": "〜ほど…ではない", "explain": "比較で『思ったほど〜ではない』『Aほど〜ではない』と言う時に使います。", "contrast": "比は『AはBより〜』、没有…那么…は『AはBほど〜ではない』です。", "mistake": "我的中文没有我觉得那么好 より、我的中文没有我想象的那么好 が自然です。", "example": "我的中文没有我想象的那么好。", "exPinyin": "Wǒ de Zhōngwén méiyǒu wǒ xiǎngxiàng de nàme hǎo.", "exJa": "私の中国語は思っていたほど良くありません。", "test": "上海の冬は東京ほど寒くありません。", "answer": "上海的冬天没有东京那么冷。", "id": "d51-g0"}, {"name": "一边……一边……", "pinyin": "yìbiān…yìbiān…", "meaning": "〜しながら〜する", "explain": "同じ主語が2つの動作を同時に行う時に使います。日常会話で非常に便利です。", "contrast": "一边吃饭，一边看手机＝食べながらスマホを見る。二つの動作が同時です。", "mistake": "別々の主語を無理に入れないこと。基本は同じ人の同時動作です。", "example": "我一边吃饭，一边看手机。", "exPinyin": "Wǒ yìbiān chīfàn, yìbiān kàn shǒujī.", "exJa": "ご飯を食べながらスマホを見ます。", "test": "コーヒーを飲みながら勉強します。", "answer": "我一边喝咖啡，一边学习。", "id": "d51-g1"}, {"name": "越来越……", "pinyin": "yuèláiyuè…", "meaning": "ますます〜", "explain": "変化がだんだん強くなることを表します。越来越自然＝ますます自然になる。", "contrast": "越A越Bは『AすればするほどB』、越来越は単に『だんだん〜』です。", "mistake": "more and moreを直訳せず、越来越 + 形容詞/心理動詞で覚えると使いやすいです。", "example": "我的中文越来越自然了。", "exPinyin": "Wǒ de Zhōngwén yuèláiyuè zìrán le.", "exJa": "私の中国語はますます自然になってきました。", "test": "上海の生活にますます慣れてきました。", "answer": "我越来越习惯上海的生活了。", "id": "d51-g2"}], "test": [{"type": "mc", "q": "「记录答案」の意味は？", "options": ["ためらう", "答えを記録する", "想像する", "意味"], "answer": "答えを記録する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["记录问题", "检查语法", "检查发音", "检查听力"], "answer": "记录问题"}, {"type": "mc", "q": "文法「没有……那么……」の説明として正しいものは？", "options": ["〜ほど…ではない", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜ほど…ではない"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["我", "但是", "很忙", "想继续学习", "虽然"], " ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d52-g2"}], "test": [{"type": "mc", "q": "「检查阅读」の意味は？", "options": ["頼る", "ためらう", "読解をチェックする", "主体的に"], "answer": "読解をチェックする"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["检查表达", "检查资料", "检查句子", "检查重点"], "answer": "检查表达"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["两次", "我", "苏州", "去过"], "answer": "我去过苏州两次。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 53, "title": "Day 53｜HSK4 基礎強化", "vocab": [{"id": "d53-v0", "zh": "检查错误", "pinyin": "jiǎnchá cuòwù", "ja": "間違いをチェックする", "example": "我每天检查错误。", "exPinyin": "Wǒ měitiān jiǎnchá cuòwù.", "exJa": "私は毎日間違いをチェックする。"}, {"id": "d53-v1", "zh": "检查内容", "pinyin": "jiǎnchá nèiróng", "ja": "内容をチェックする", "example": "我每天检查内容。", "exPinyin": "Wǒ měitiān jiǎnchá nèiróng.", "exJa": "私は毎日内容をチェックする。"}, {"id": "d53-v2", "zh": "检查答案", "pinyin": "jiǎnchá dá'àn", "ja": "答えをチェックする", "example": "我每天检查答案。", "exPinyin": "Wǒ měitiān jiǎnchá dá'àn.", "exJa": "私は毎日答えをチェックする。"}, {"id": "d53-v3", "zh": "检查问题", "pinyin": "jiǎnchá wèntí", "ja": "問題をチェックする", "example": "我每天检查问题。", "exPinyin": "Wǒ měitiān jiǎnchá wèntí.", "exJa": "私は毎日問題をチェックする。"}, {"id": "d53-v4", "zh": "准备语法", "pinyin": "zhǔnbèi yǔfǎ", "ja": "文法を準備する", "example": "我每天准备语法。", "exPinyin": "Wǒ měitiān zhǔnbèi yǔfǎ.", "exJa": "私は毎日文法を準備する。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送ってください。", "test": "住所を私に送ってください。", "answer": "请把地址发给我。", "id": "d53-g0"}, {"name": "動詞 + 得 + 程度", "pinyin": "dòngcí + de + chéngdù", "meaning": "どの程度〜するか", "explain": "動詞の後に得を置き、その後ろで程度を説明します。話すのが自然、走るのが速い、作るのが上手い、などに使います。", "contrast": "我说中文＝中国語を話す。 我中文说得很好＝中国語を話すのが上手い。", "mistake": "我讲中文自然 より 我中文说得很自然 が自然です。", "example": "我中文说得还不太自然。", "exPinyin": "Wǒ Zhōngwén shuō de hái bú tài zìrán.", "exJa": "私の中国語はまだあまり自然ではありません。", "test": "彼は話すのがとても速いです。", "answer": "他说得很快。", "id": "d53-g1"}, {"name": "结果补语：動詞 + 完/好/到", "pinyin": "jiéguǒ bǔyǔ", "meaning": "動作の結果を表す", "explain": "中国語は『動作がどうなったか』をはっきり言うことが多いです。看完＝見終わる、做好＝完成させる、找到＝見つける。", "contrast": "看了＝見た。 看完了＝見終わった。結果まで言うので意味が具体的です。", "mistake": "『宿題をした』と言いたい時、終わったなら 做完作业了 が自然です。", "example": "我已经看完报告了。", "exPinyin": "Wǒ yǐjīng kàn wán bàogào le.", "exJa": "私はもう報告書を読み終えました。", "test": "宿題をやり終えました。", "answer": "我做完作业了。", "id": "d53-g2"}], "test": [{"type": "mc", "q": "「检查错误」の意味は？", "options": ["間違いをチェックする", "明らか", "正式な", "頼る"], "answer": "間違いをチェックする"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["检查内容", "检查答案", "检查问题", "准备语法"], "answer": "检查内容"}, {"type": "mc", "q": "文法「把構文」の説明として正しいものは？", "options": ["目的語をどう処理したか", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "目的語をどう処理したか"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["开着", "门"], "answer": "门开着。"}, {"type": "writing", "q": "彼は話すのがとても速いです。", "answer": "他说得很快。"}]}, {"day": 54, "title": "Day 54｜HSK4 基礎強化", "vocab": [{"id": "d54-v0", "zh": "准备发音", "pinyin": "zhǔnbèi fāyīn", "ja": "発音を準備する", "example": "我每天准备发音。", "exPinyin": "Wǒ měitiān zhǔnbèi fāyīn.", "exJa": "私は毎日発音を準備する。"}, {"id": "d54-v1", "zh": "准备听力", "pinyin": "zhǔnbèi tīnglì", "ja": "リスニングを準備する", "example": "我每天准备听力。", "exPinyin": "Wǒ měitiān zhǔnbèi tīnglì.", "exJa": "私は毎日リスニングを準備する。"}, {"id": "d54-v2", "zh": "准备阅读", "pinyin": "zhǔnbèi yuèdú", "ja": "読解を準備する", "example": "我每天准备阅读。", "exPinyin": "Wǒ měitiān zhǔnbèi yuèdú.", "exJa": "私は毎日読解を準備する。"}, {"id": "d54-v3", "zh": "准备表达", "pinyin": "zhǔnbèi biǎodá", "ja": "表現を準備する", "example": "我每天准备表达。", "exPinyin": "Wǒ měitiān zhǔnbèi biǎodá.", "exJa": "私は毎日表現を準備する。"}, {"id": "d54-v4", "zh": "准备资料", "pinyin": "zhǔnbèi zīliào", "ja": "資料を準備する", "example": "我每天准备资料。", "exPinyin": "Wǒ měitiān zhǔnbèi zīliào.", "exJa": "私は毎日資料を準備する。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d54-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d54-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d54-g2"}], "test": [{"type": "mc", "q": "「准备发音」の意味は？", "options": ["発音を準備する", "臨時の", "突然", "正式な"], "answer": "発音を準備する"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我每天____。", "options": ["准备听力", "准备阅读", "准备表达", "准备资料"], "answer": "准备听力"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["一边吃饭", "一边看手机", "他"], "answer": "他一边吃饭，一边看手机。"}, {"type": "writing", "q": "忙し "pinyin": "fùxí biǎodá 310", "ja": "表現を復習する310", "example": "我今天要复习表达310。", "exPinyin": "Wǒ jīntiān yào fùxí biǎodá 310.", "exJa": "私は今日、表現を復習します。"}], "grammar": [{"name": "方向补语：来/去", "pinyin": "fāngxiàng bǔyǔ", "meaning": "動作の方向を表す", "explain": "来は話し手に近づく方向、去は離れる方向です。进来＝入ってくる、进去＝入っていく、拿过来＝持ってくる。", "contrast": "拿进来＝中に持ってくる。 拿出去＝外に持っていく。方向を言うと場面がはっきりします。", "mistake": "日本語では省略しがちな『来/去』を、中国語では必要な場面で入れると自然です。", "example": "你把外卖拿进来吧。", "exPinyin": "Nǐ bǎ wàimài ná jìnlái ba.", "exJa": "デリバリーを中に持ってきてください。", "test": "彼は出て行きました。", "answer": "他走出去了。", "id": "d62-g0"}, {"name": "虽然……但是……", "pinyin": "suīrán…dànshì…", "meaning": "〜だけれども、しかし〜", "explain": "逆接をはっきり作る表現です。前半で事実や条件を言い、後半でそれと反対・意外な結果を言います。", "contrast": "会話では但是を省略することもありますが、HSK対策では虽然…但是…で覚えると安定します。", "mistake": "日本語の『でも』だけの感覚で短くつなぐと、文の論理が弱くなります。", "example": "虽然有点儿贵，但是很好吃。", "exPinyin": "Suīrán yǒudiǎnr guì, dànshì hěn hǎochī.", "exJa": "少し高いですが、とても美味しいです。", "test": "忙しいですが、勉強を続けたいです。", "answer": "虽然很忙，但是我想继续学习。", "id": "d62-g1"}, {"name": "因为……所以……", "pinyin": "yīnwèi…suǒyǐ…", "meaning": "〜なので、だから〜", "explain": "理由と結果をはっきりつなぐ表現です。因为で理由、所以で結果を言います。", "contrast": "会話では片方だけ使うこともあります。今天太忙，所以不能去。/ 因为太贵了，我没买。", "mistake": "英語のbecauseとsoを両方使わない感覚に引っ張られなくてOK。中国語では両方使えます。", "example": "因为地铁很方便，所以我每天坐地铁上班。", "exPinyin": "Yīnwèi dìtiě hěn fāngbiàn, suǒyǐ wǒ měitiān zuò dìtiě shàngbān.", "exJa": "地下鉄が便利なので、毎日地下鉄で通勤しています。", "test": "時間がないので、昼ごはんを食べませんでした。", "answer": "因为没有时间，所以我没吃午饭。", "id": "d62-g2"}], "test": [{"type": "mc", "q": "「复习表达306」の意味は？", "options": ["周辺", "近く", "表現を復習する306", "〜に関わらず"], "answer": "表現を復習する306"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我今天要____。", "options": ["复习表达307", "复习表达308", "复习表达309", "复习表达310"], "answer": "复习表达307"}, {"type": "mc", "q": "文法「方向补语：来/去」の説明として正しいものは？", "options": ["動作の方向を表す", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "動作の方向を表す"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["一边吃饭", "一边看手机", "他"], "answer": "他一边吃饭，一边看手机。"}, {"type": "writing", "q": "忙しいですが、勉強を続けたいで を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d76-g2"}], "test": [{"type": "mc", "q": "「复习表达376」の意味は？", "options": ["表現を復習する376", "主要な", "難しい", "重要"], "answer": "表現を復習する376"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我今天要____。", "options": ["复习表达377", "复习表达378", "复习表达379", "复习表达380"], "answer": "复习表达377"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["去过", "两次", "我", "苏州"], "answer": "我去过苏州两次。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 77, "title": "Day 77｜HSK4 基礎強化", "vocab": [{"id": "d77-v0", "zh": "复习表达381", "pinyin": "fùxí biǎodá 381", "ja": "表現を復習する381", "example": "我今天要复习表达381。", "exPinyin": "Wǒ jīntiān yào fùxí biǎodá 381.", "exJa": "私は今日、表現を復習します。"}, {"id": "d77-v1", "zh": "复习表达382", "pinyin": "fùxí biǎodá 382", "ja": "表現を復習する382", "example": "我今天要复习表达382。", "exPinyin": "Wǒ jīntiān yào fùxí biǎodá 382.", "exJa": "私は今日、表現を復習します。"}, {"id": "d77-v2", "zh": "复习表达383", "pinyin": "fùxí biǎodá 383", "ja": "表現を復習する383", "example": "我今天要复习表达383。", "exPinyin": "Wǒ jīntiān yào fùxí biǎodá 383.", "exJa": "私は今日、表現を復習します。"}, {"id": "d77-v3", "zh": "复习表达384", "pinyin": "fùxí biǎodá 384", "ja": "表現を復習する384", "example": "我今天要复习表达384。", "exPinyin": "Wǒ jīntiān yào fùxí biǎodá 384.", "exJa": "私は今日、表現を復習します。"}, {"id": "d77-v4", "zh": "复习表达385", "pinyin": "fùxí biǎodá 385", "ja": "表現を復習する385", "example": "我今天要复习表达385。", "exPinyin": "Wǒ jīntiān yào fùxí biǎodá 385.", "exJa": "私は今日、表現を復習します。"}], "grammar": [{"name": "把構文", "pinyin": "bǎ gòuwén", "meaning": "目的語をどう処理したか", "explain": "把構文は、目的語に対して何をして、その結果どうなったかを強調します。『〜を…する』だけでなく、結果・方向・場所まで言うのが自然です。", "contrast": "我发资料＝資料を送る。 我把资料发给你＝資料をあなたに送る、という処理が明確。", "mistake": "我把资料发 は不自然です。发给你、发过去、发完了のように結果を付けます。", "example": "请把资料发给我。", "exPinyin": "Qǐng bǎ zīliào fā gěi wǒ.", "exJa": "資料を私に送 ān yào fùxí biǎodá 400.", "exJa": "私は今日、表現を復習します。"}], "grammar": [{"name": "过：経験を表す", "pinyin": "guo", "meaning": "〜したことがある", "explain": "过は、過去にその経験があるかどうかを表します。時間そのものより『経験の有無』に焦点があります。否定は「没 + 動詞 + 过」です。", "contrast": "了は完了・変化、过は経験です。例：我去了北京＝北京に行った。/ 我去过北京＝北京に行ったことがある。", "mistake": "日本語の『行った』を全部了にしないこと。経験なら过を使います。", "example": "我去过苏州。", "exPinyin": "Wǒ qùguo Sūzhōu.", "exJa": "蘇州に行ったことがあります。", "test": "私はこの料理を食べたことがありません。", "answer": "我没吃过这个菜。", "id": "d80-g0"}, {"name": "了：変化・完了", "pinyin": "le", "meaning": "〜した、〜になった", "explain": "了は単純な過去ではなく、動作の完了や状況の変化を表します。文末の了は『状況が変わった』ニュアンスが強いです。", "contrast": "我吃饭了＝ご飯を食べた/食べる状況になった。 我吃过这家店＝この店で食べた経験がある。", "mistake": "昨日＝必ず了、ではありません。過去の時間語だけで過去は表せます。", "example": "下雨了。", "exPinyin": "Xiàyǔ le.", "exJa": "雨が降ってきました。", "test": "寒くなりました。", "answer": "变冷了。", "id": "d80-g1"}, {"name": "着：状態の持続", "pinyin": "zhe", "meaning": "〜している状態", "explain": "着は動作そのものではなく、動作の結果として続いている状態を表します。ドアが開いている、メガネをかけている、などに使います。", "contrast": "正在は動作の進行、着は状態の持続。正在开门＝ドアを開けている最中。门开着＝ドアが開いている状態。", "mistake": "正在开着のように、進行と状態を雑に重ねないよう注意。", "example": "门开着。", "exPinyin": "Mén kāizhe.", "exJa": "ドアが開いています。", "test": "窓が開いています。", "answer": "窗户开着。", "id": "d80-g2"}], "test": [{"type": "mc", "q": "「复习表达396」の意味は？", "options": ["表現を復習する396", "安心する", "満足する", "心配する"], "answer": "表現を復習する396"}, {"type": "mc", "q": "次の文の空欄に入る語は？\n我今天要____。", "options": ["复习表达397", "复习表达398", "复习表达399", "复习表达400"], "answer": "复习表达397"}, {"type": "mc", "q": "文法「过：経験を表す」の説明として正しいものは？", "options": ["〜したことがある", "単純な名詞修飾だけを表す", "数字の読み方だけを表す", "疑問文だけを作る"], "answer": "〜したことがある"}, {"type": "drag", "q": "語句を正しい順番にタップしてください。", "words": ["把", "我", "请", "资料", "发给"], "answer": "请把资料发给我。"}, {"type": "writing", "q": "寒くなりました。", "answer": "变冷了。"}]}, {"day": 81, "title": "Day 81｜HSK4 基礎強化", "vocab": [{"id": "d81-v0", "zh": "复习表达401", "pinyin": "fùxí biǎodá 401", "ja": "表現を復習する401", "example": "我今天要复习表达401。", "exPinyin": "Wǒ jīntiān yào fùxí biǎodá 401.", "exJa": "私は今日、表現を復習します。"}, {"id": "d81-v1", "zh": "      <div class="note"><span class="label">解説：</span>${esc(g.explain)}</div>
     <div class="note"><span class="label">違い・注意：</span>${esc(g.contrast)}</div>
     <div class="note"><span class="label">日本人が間違えやすい点：</span>${esc(g.mistake)}</div>
     <div class="ex"><span class="label">例文：</span>${esc(g.example)}</div><div class="pinyin expinyin">${esc(g.exPinyin)}</div><div class="ja exja">${esc(g.exJa)}</div>
    </div>`).join('')}
  </div>
  <div class="card" id="testCard">
   <div class="section-title"><h2>今日のミニテスト</h2><button onclick="gradeTest()" class="primary">採点する</button></div>
   <div id="testArea">${renderTest(l)}</div><div id="scoreArea"></div>
  </div>`;
 setupDrag();
 updateCompleteButtons();
}
function renderTest(l){
 return l.test.map((q,i)=>{
  const key=`d${l.day}q${i}`;
  if(q.type==='mc'){
   return `<div class="testq"><b>Q${i+1}.</b> ${esc(q.q).replaceAll('\\n','<br>')}
    <div class="opts">${q.options.map(o=>`<label class="opt"><input type="radio" name="${key}" value="${esc(o)}" ${state.answers[key]===o?'checked':''} onchange="state.answers['${key}']=this.value;save()"> ${esc(o)}</label>`).join('')}</div>
    <div class="answer">正解：<span class="good">${esc(q.answer)}</span></div></div>`;
  }
  if(q.type==='drag'){
   const selected=(state.dragOrders[key]||[]).filter(x=>x && typeof x==='object' && 'idx' in x && 'word' in x);
   state.dragOrders[key]=selected;
   const selectedKeys=new Set(selected.map(x=>x.idx));
   return `<div class="testq"><b>Q${i+1}.</b> 語句を正しい順番にタップしてください。
    <div class="small muted">上の候補をタップすると、下の回答欄に順番に入ります。間違えたら「1つ戻す」か「語順リセット」。</div>
    <div class="drag-area" data-key="${key}">
      ${q.words.map((w,idx)=>`<button type="button" class="chip ${selectedKeys.has(idx)?'used':''}" onclick="selectOrderChip('${key}', ${idx}, '${esc(w)}')" ${selectedKeys.has(idx)?'disabled':''}>${esc(w)}</button>`).join('')}
    </div>
    <div class="answer-area">
      ${selected.length?selected.map((x,n)=>`<span class="chip answer-chip">${n+1}. ${esc(x.word)}</span>`).join(''):'<span class="small muted">ここにタップした順で語句が入ります</span>'}
    </div>
    <input type="text" readonly value="${esc(state.answers[key]||'')}" placeholder="タップした語順がここに入ります">
    <div class="row" style="margin-top:8px">
      <button type="button" onclick="undoOrderChip('${key}')">1つ戻す</button>
      <button type="button" onclick="resetOrderChips('${key}')">語順リセット</button>
    </div>
    <div class="answer">参考解答：<span class="good">${esc(q.answer)}</span></div></div>`;
  }
  return `<div class="testq"><b>Q${i+1}.</b> ${esc(q.q)}
    <textarea placeholder="ここに作文を入力" oninput="state.answers['${key}']=this.value;save()">${esc(state.answers[key]||'')}</textarea>
    <div class="answer">参考解答：<span class="good">${esc(q.answer)}</span><div class="small muted">作文は参考解答と比べて自己採点してください。</div></div></div>`;
 }).join('');
}
function syncDrag(area){
 const key=area.dataset.key;
 const words=[...area.querySelectorAll('.chip')].map(x=>x.dataset.word);
 state.dragOrders[key]=words;
 state.answers[key]=words.join('');
 const input=area.parentElement.querySelector('input[type=text]');
 if(input) input.value=state.answers[key];
 save();
}
function selectOrderChip(key, idx, word){
 if(!state.dragOrders[key]) state.dragOrders[key]=[];
 if(state.dragOrders[key].some(x=>x.idx===idx)) return;
 state.dragOrders[key].push({idx, word});
 state.answers[key]=state.dragOrders[key].map(x=>x.word).join('');
 save();
 render();
}
function undoOrderChip(key){
 if(state.dragOrders[key] && state.dragOrders[key].length){
   state.dragOrders[key].pop();
   state.answers[key]=state.dragOrders[key].map(x=>x.word).join('');
   save();
   render();
 }
}
function resetOrderChips(key){
 state.dragOrders[key]=[];
 state.answers[key]='';
 save();
 render();
}
function setupDrag(){
 // iPhoneのファイルプレビューではHTML5ドラッグが効きにくいため、
 // v9ではドラッグではなく「タップした順に並べる」方式に変更。
}
function norm(s){return String(s||'').replace(/[，。！？、,.!?\s]/g,'').toLowerCase()}
function gradeTest(){
 const l=lesson(); let score=0,total=4;
 l.test.forEach((q,i)=>{ if(q.type==='writing')return; const key=`d${l.day}q${i}`; if(norm(state.answers[key])===norm(q.answer)) score++; });
 state.scores[l.day]=score; save();
 const msg=score===4?'很好！自動採点部分は満点です。':score===3?'不错。1問だけ復習しましょう。':score===2?'もう一歩。文法解説を読み直すと伸びます。':'復習優先。今日は単語と文法例文を音読しましょう。';
 $('scoreArea').innerHTML=`<div class="scorebox">ミニテスト：<b>自動採点 ${score}/${total}</b> ＋ 作文1問<br>${msg}<br><span class="small muted">全5問中、Q1〜Q4は自動採点、Q5作文は参考解答と見比べて自己採点してください。</span></div>`;
 showAnswers=true; $('answerBtn').textContent='解答を隠す'; $('answerBtn').className='toggle on'; $('content').className='show-answers';
}
function setDay(d){homeView=false;current=Math.max(1,Math.min(LESSONS.length,d));showAnswers=false;$('answerBtn').textContent='解答を表示';$('answerBtn').className='toggle off';render();window.scrollTo({top:0,behavior:'smooth'})}
function updateCompleteButtons(){
 const done=!!state.completed[current];
 $('completeBtn').textContent=done?'完了済み：未完了に戻す':'このDayを完了にする';
 $('completeBtn').className='complete'+(done?' active':'');
 $('bottomComplete').textContent=done?'完了済み':'完了';
 $('bottomComplete').className='complete'+(done?' active':'');
}
function toggleComplete(){state.completed[current]=!state.completed[current];save();render();}
$('homeBtn').onclick=()=>{homeView=true;bookmarkView=false;render();window.scrollTo({top:0,behavior:'smooth'});};
$('daySelect').onchange=e=>setDay(Number(e.target.value));
$('prevBtn').onclick=()=>setDay(current-1); $('nextBtn').onclick=()=>setDay(current+1);
$('bottomPrev').onclick=()=>setDay(current-1); $('bottomNext').onclick=()=>setDay(current+1);
$('completeBtn').onclick=toggleComplete; $('bottomComplete').onclick=toggleComplete;
$('pinyinBtn').onclick=()=>{document.body.classList.toggle('hidden-pinyin'); const hidden=document.body.classList.contains('hidden-pinyin'); $('pinyinBtn').textContent=hidden?'拼音を表示':'拼音を隠す'; $('pinyinBtn').className='toggle '+(hidden?'on':'off');}
$('jaBtn').onclick=()=>{document.body.classList.toggle('hidden-ja'); const hidden=document.body.classList.contains('hidden-ja'); $('jaBtn').textContent=hidden?'日本語訳を表示':'日本語訳を隠す'; $('jaBtn').className='toggle '+(hidden?'on':'off');}
$('answerBtn').onclick=()=>{showAnswers=!showAnswers;$('answerBtn').textContent=showAnswers?'解答を隠す':'解答を表示';$('answerBtn').className='toggle '+(showAnswers?'on':'off');$('content').className=showAnswers?'show-answers':''}
$('bookmarkViewBtn').onclick=()=>{bookmarkView=!bookmarkView;render();window.scrollTo({top:0,behavior:'smooth'});}
render();
</script>
</body></html>
